body:
  text: 庸菴集卷十元宋禧撰七言絶句趙松雪唐馬圖滿身雲氣五花明執轡奚官似奉盈應是龍顔思一顧承恩牽向赤墀行雲山圖山中樓閣映松杉雲外金雞啼翠巖猶記百花深處立露珠顆顆滴春衫為沈生題畫蘭為誰消瘦不禁秋夢逐湘江日夜流别後豈知腰帶緩寄來香珮只添愁蘭石圖明珠翠帶倚秋風石上雲生暮色中漠漠度江吹作雨為誰飛傍楚王宫蘭石雨竹圖又别春風翠羽衣天涯今向雨中歸翻思解佩江臯日玉氣為雲戀落暉閏三月草二日過北郭王氏書舍觀酴醿留飲花下酒酣為題王山農畫圖時立夏已九日矣春歸北郭看酴醿却見梅花為賦詩二十四畨花信後薰風不似朔風吹唐馬圖雙樹隂濃兩馬肥春來沙苑又春歸何人對坐憐芳草緑映紅衣與白衣觀杜牧之題烏江廟詩有感于謝疊山之評因次韻見意人事興衰定可期范增豈勝外黃兒江東豪俊誰為用不道王陵母已知奉和危先生送浩秋江還龍泉寺前二年九月豫常以史局事畢還自龍河去年秋吾鄉前龍泉住持天台白雲翁亦以髙僧徵至龍河而還其大弟子從其往還者秋江上人也秋江還龍泉臨川危先生在龍河用其先世章簡公龍泉晚意韻賦絶句一首送之兼簡白雲翁翁蓋與臨川有三十年之雅既和其詩同郡朱雲巢徵士時續筆史局相繼東還過龍泉亦于臨川之詩和之今年辛亥七月十二日白雲翁偕豫登秋江所居之閣乃取三絶句以觀俾豫次韻于後且言秋江將以唱和諸章并其所和者刻石留山中何其好事若是也豫既重違翁意復私念數人者皆常有龍河之行而于龍泉又豈無緣契也耶遂為之追和然豫詩鄙陋不足傳或者得附諸公傑作託名刻石使後人觀之寧無可愧者乎長江秋晚照清暉猶憶江花送白衣千里舟歸先後客今朝山閣看鷗飛為周銘德題春草圖新昌周銘德事其母甚謹而以事數出未免不克盡如其志于孟東野寸草春暉之語有感于心欲得吾鄉鄭山輝先生春草圖頗久今先生已歿其墨迹益不易得銘德之友胡汝州為購得一紙從豫言其故而徵詩題之豫既嘉銘德之孝又重汝洲之請乃為賦絶句一首濓溪孫子念庭闈草色關情上客衣緑暗故園歸未得夢中亦自惜春暉八月草五夜為人題畫梅曾尋春信踏層冰老去愁多白髮增誰料秋風黃葉夜寒花影照緑窗燈八月草五日題梅畫之際俄有蜜蜂自燈前飛集畫上再賦絶句一首燈前勾引蜜蜂來應為寒花夜半開却怪蓬萊花鳥使月明今夜在瑶臺為倪原道題王時敏畫梅繁花亂插酒船回作客王郎醉莫哀且向賀溪尋賀老鐵心作賦已成灰原注豫與王時敏過姻戚倪氏時敏酒酣為原道作梅畫一紙并自題詩且謂不讓王山農之作豫于時敏甚愛其才常慮其狂疾或作今觀其詩果又以狂為言不可不遏其疾之作也因用其詩之末句題二十八字時敏肯用是自嗇而未有四方之遊則豫詩之力不愈于酒之能行藥乎雪月梅畫天寒獨立夢相牽山澤論交不記年雪裏芳心還自苦隴頭月影為誰圓自題畫石壁萬仭不可躋老樹獨立與雲齊紛紛藤蘿葉零亂日暮忽隨風雨西原注今年辛亥嵗九月三日豫在姻戚倪氏孝思庵與時敏吳溫夫汪復初倪原道及其從弟安道從子用彰鈔書午飲既酣原道令人拭壁請豫作墨戲豫素不解此技連日見時敏為人作梅畫紙價涌貴老夫未免技癢亟呼茅帚隨意揮灑此效黨太尉掉書袋也時敏乃狂躍稱賞不知何故是日别豫而去不及見豫一時之狂者原道世父谷真翁徐性全也為研墨執硯侍立不倦者原道從子玄福其姊胥在旁從衆而觀者吾季兒邦哲庵居供茗與倪氏有姻戚之舊者馬本道也題王時敏所作倪氏孝思庵壁上老梅圖老梅變化殊有神素壁不能容大身王郎擲筆苦抑塞百花雲暗江南春即事八月草八夜與徐性全汪復初吳溫夫王時敏宿上虞倪𢎞道家𢎞道為置酒其季如道戲以棗核加燭上發輝若五出花坐客皆為盡歡而醉如道請豫賦詩遂成二十八字棗心入火解開花銀燭當宵惜嵗華花下十年思結實深秋遊子未還家原注時坐客多有未得子者題王時敏畫今年辛亥八月下旬豫與王時敏遊上虞賀溪半月乃過小山陳氏書舍甫及其門而時敏有儒士之徵使者繼至明旦還吾邑猶為陳子範等作墨梅數紙且為賦詩可見其迂之甚矣故豫題其畫以記一時之事誰憐迂甚王徵士不管江頭驛使催秋晚小山叢桂下為人猶寫數枝梅逺近榮枯雙樹圖老樹迂疏似老翁女蘿垂帶舞秋風行人只看青青樹少壯榮華眼底同在小山題畫梅桂枝留客小山中作賦曾聞漢八公今日觀梅動詩興小山誰憶鐵心翁趙鳴玉為小山陳隱居作小像于雙松之下鳴玉既為丞江寧縣隱居出此畫索豫題詩趙郎赤縣之官去得似崔丞對二松松下文人山谷裏憶渠鞴馬聽晨鍾雪窗畫蘭憶昔館娃蘭葉紅為誰泣露怨春風千年月照虎丘寺影落山僧圖畫中王山農畫梅山農作畫愛梅花身後聲名擅一家獨倚寒村誰泯滅吟詩空恨夕陽斜為陳生子範題鄭山輝東山指石圖未識東山已白頭徒聞指石俯江流深秋鄰縣看圖畫吟倚陳家百尺樓題丹山圖不到丹山又幾年山中白水想依然素衣曾向征途去一浣黃塵願學仙在賀溪題時敏畫梅半月看花住賀溪王郎幾度醉如泥無端驛使徵求急東閣吟詩不暇題題倪元鎮平逺圖此畫吳郡倪翁元鎮所作吾邑胡斯原得而藏之者也豫聞張氏入吳時聞翁名欲官之翁作漁人乘扁舟遁太湖萑苻中猶焚香自適張氏竟以此得翁然終不能奪其志也斯原徵豫題其畫豫以所聞而敬其為人遂書絶句一首菰蒲深處恨焚香笠澤扁舟不可藏誰倚疏林看山水太平無事得清狂題趙文敏竹石圖玉堂綵筆寫秋風石色含雲竹影中一代風流今已矣何人聽雨水晶宫為岑西峯題鄭山輝畫懸崖蘭用其韻勝地平生幾度遊曾看翡翠立芳洲西山髙處花如玉暮景聞香一倚樓冬至日為楊生題李松雲墨竹至日經過江上宅竹枝含翠出南牆嵗寒莫道風霜苦已覺南窗日影長為岑西峯題耕雲友西峯圖二首山上晴雲似白綿隨風渡水落平田一犁有事春隂裏誰對林窗曙空眠其二海上三山黛色連西峯氣勢更超然樓居相對青松樹瓊島飛來跨鶴仙辛亥歲十一月二十日夜觀楊昭度所作墨竹有感遂題其上後清漁舍近嚴灘歲晚江空竹影寒留得畫圖成絶筆燈前空憶釣魚竿題夏圭畫寒巖如削雪糢糊林木蕭疏半有無江上孤舟人獨􅉨山中髙閣路何迂蓬島圖蓬萊春色映樓臺紅白山花日夜開海水東流千萬里風帆得便許誰來三月一日在僧舍題山輝枯木圖南山落木耐髙寒野老關情仔細看死去畫圖留寶地殘春花草近闌干四月二日過鄭生朝益書舍既晏遇雨生為煮筍具飯飯罷以李太守墨竹求豫題詩晚食留人因煮筍雨窗看畫為題詩誰知北郭銷愁日豈似篔簹噴飯時蕙花圖蕙花江上見飛仙愁破清和四月天别去空留環珮影為誰搖曳水風前題風梅圖含章簷下最多情睡起新粧夢裏成誰向東樓吹玉笛也知不是斷腸聲題畫原上雙禽立雪中一醒一困寸心同飢來應是相呼喚野果渾如瑪瑙紅為王生思誠題趙待制圖畫雲山相對垂綸客白石齊暉樹影疏雨後誰嫌江水濁早潮應有上灘魚題柯博士畫身自奎章閣上歸人間竹樹倍光輝自憐華髮看春筍不見兒郎著錦衣題風煙雪月梅畫誰愛春風入畫簷香飄深院半開簾主人應與花同夢點額新粧故故添瑶臺咫尺隔青煙縞袂蕭蕭立暮天塵世何人空送日神交自有玉堂仙山中夜半緑窗明夢裏天香下玉京蠟屐出門尋舊約花間翠鳯不須驚廣平作賦謾多情嵗晚看花白髮明玉笛誰吹今夜月虗聞搗藥兔長生西湖竹枝詞十三女郎不出門爺娘墓在葛山根同攜女伴踏青去不上道傍蘇小墳湖上采薪春復春飬蠶長見繭絲新老蠶不識人間事猶趁東風了此身詞鷓鴣天鵝湖寺道中一榻清風殿影涼涓涓流水響回廊千章雲木鉤輈呌十里溪風䆉稏香衝急雨趂斜陽山圍細路轉微茫倦途却被行人笑只為林泉有底忙
