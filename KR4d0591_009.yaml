body:
  text: 庸菴集卷九元宋禧撰七言絶句立夏日為楊昭度孤子題山輝畫門外草青楊子家階前玉潤有蘭芽春歸今日看圖畫石畔辛夷未著花四月草九日過楊氏嘉樹軒見紅葵盛開賦絶句一首窗外花開一丈紅南風搖動緑隂中傾陽心曲何人見雨打梅花白髮翁贈王駿斬蛟射虎成功後寶劍雕弓取次藏王謝堂前雙燕子銜泥莫汚讀書廊四月草九日為楊生士立題其先父昭度畫竹昔日曾憐虎豹姿今年忽見鳯凰枝可憐對雨思君子正近梅天五月時題山輝畫二首竹能結實蘭茁芽菖蒲有莭鮮開花鄭翁一去不復返畫圖留落山人家其二長為幽芳作畫圖老年左臂竟偏枯絶憐鄭老徒辛苦身後聲名有益無為倪原道題梅花畫扇江城五月見梅花畫扇風生月影斜不怕髙樓吹玉笛憑誰寄到水西家為胡生懋題王時敏紅梅畫去年京洛寸心酸歸到江南淚未乾泣血只疑花濺淚故園不作杏花看原注胡生曩以父喪還自河南有泣血之苦而事母讀書不懈有足念者故為賦此詩題紅梅畫四首莫向羅浮月下遊天寒有酒豈銷愁暮年作賦江南客可使紅顔對白頭其二春色隨人雪裏歸玉堂清夢已相違宫袍莫怪裁雲錦更有緇塵染素衣其三玉顔淨洗西湖水一見令人日夜思圖畫寫真誰寄到東塗西抹費胭脂其四幾年冷落在深宫不入霓裳舞隊中欲得君王同一笑也將紅袖拂春風為傅伯原題白雲親舍圖暨陽傅伯原吾師鐵崖先生楊公之壻其舅氏錢舜在又與豫同受經于先生之門故伯原視豫猶骨肉親也乙未歲豫與伯原會錢唐而别今十有六年矣豫以事適閩道過常山伯原為驛官于兹而復與豫會執手問故舊輒為之流涕獨喜其母夫人固無恙得侍養官舍伯原出向者所藏白雲親舍圖示豫豫遂為題絶句一首以寓感慨之意云幾年天際望雲飛日日思親淚滿衣今日常山官舍裏白雲朝暮在庭闈與三山驛官陸公亮同舟至水口驛為題胡廷輝山水畫入閩貪看武夷山箭急官船不得閒水口題詩酬驛使酒醒雲影畫圖間趙文敏馬圖愛此天間白鼻騧不同老驥服鹽車也知冀北空羣日未見龍駒出渥窪題王山農畫梅山隂對雪寫南枝此老平生獨好竒同郡相逢每相失却來閩越為題詩題畫松林日落碧雲開野老溪頭坐石苔隔岸好山招不到一篙流水待誰來唐馬圖身上青雲照地光御溝春水落花香霜蹄只踏長安道泣血空聞古戰場垂栁雙燕圖多情雙燕不同飛緑暗章臺柳葉肥巧向垂絲低處立回身風動舊烏衣還自閩中九月草八夜宿石溪徐氏店昨夜鉛山驛裏眠夜深官燭照青氊石溪茅屋今宵宿松火為燈一榻烟十月一日早發廣信玉溪驛舍次桂同德韵趣罷行裝未出城玉溪驛舍燭花明五更歸夢千餘里吹醒悲笳第一聲十月十一日蘭溪道中感懷二首清溪紅樹夕陽邊緩步平灘帶畫船曾聽醉眠居士說只今詩興似當年其二醉眠居士已仙遊歸自閩中我白頭經過江山得詩句晤言更有此翁不十月十三日至浙江驛候潮而渡有半日之留表忠觀去驛一里許土人無有識之者驛使毛和仲金華儒家子也獨能以表忠為言遂導吾入游焉感而為賦絶句二首浙江驛使毛和仲云是金華詩禮家誰識龍山表忠觀獨能引客入烟霞其二蘇公文翰表忠碑山下居人識者希舊觀有基黃葉滿可憐斷石帶清暉題懸崖蘭畫山頭仙子倚烟蘿下土遙瞻奈爾何翠帶春風吹不起月明倒影在湘波即事戲作王孟陽從章宗厚借驢往龍山宗厚俟其還及還過宗厚家西二里許其小蒼頭從行者以無其主言固持驢不放去至欲以杖擊之孟陽笑而還其驢豫為戲成口號一首東家借得蹇驢騎中路蒼頭竟奪歸豈識主人朋友意早年裘馬共輕肥題畫東南山水足清暉茅屋楓林共石磯誰坐扁舟沙際住也知江海客忘歸張介夫畫山水衮衮雲連叠叠峯孤舟泊近水邊松遊人橋畔看飛瀑樓閣桃花隔幾重題趙文敏寒風瘦馬圖蕭梢尾鬛一身秋還解追風似舊不賴有奚奴憐駿骨袖籠烏帽為回頭題王時敏畫梅二首江邊翠閣為誰開野老看花雨裏來怪殺王郎乘酒興直教玉女下瑶臺其二王郎作畫復銜杯我為題詩日幾回簾外不知春雨落硯邊猶見暮花開題王山農畫梅山隂道上每相逢當日梅花在眼中笑我題詩無一字吐辭不及廣平公在梅川為人題畫梅梅川梅雨阻歸人看畫題詩過一旬却憶去年冰雪後回舟花送一枝春蕙花圖香飄百畒正氤氲作賦靈均豈厭聞我愛南風吹汝急參差花葉總成文為術者胡桂堂題山輝翁圖雨後相逢北郭生謾將牛斗論平生卷簾笑看間花草一度春風一度榮枯木蘭石圖洞庭木落怨湘娥紉佩含情奈爾何秋水不禁涼葉碧花開斜日不須多二月草日夜在城南僧舍題山輝翁春草圖春院重過一夕留忽思鄭老使人愁更闌秉燭看圖畫緑草紅花我白頭題山輝翁畫戊戌己亥豫以邑郭有桴鼓之警嘗挈纍避寓燭溪山谷中依姻戚潘氏以屏其跡者數月而鈞輔鈞茂諸昆弟朝暮相顧慰其情不可忘也今年三月四日復過其家鈞輔昆弟出鄭山輝先生畫索豫題詩豫感念往昔之事固若一日而觀山輝所畫者足為辟地者之娛而于豫心適有契也故為賦絶句一首以見意薜荔為衣蘭作佩雲間石室可容身秋風黃葉渾無路古木回巖别有春題李石樓清明墨竹二首西窗留得此君看春雨蕭蕭作暮寒記得前年山雪盛人間問訊喜平安其二粉牆春晚弄春暉昨有青雲覆作衣誰料使君持節去天涯風雨不能歸題王若水畫三首棠梨結實荆條並石菊開花草色齊風葉一枝秋色冷月中還許錦雞棲其二一雙山鵲玩春暉天上秋期總不知也好衝花如繡羽暮棲荆棘最髙枝其三擇枝小鳥雌雄近出土幽筍子母齊誰向緑窗成獨宿銀燈花落聽兒啼題張淑厚畫三首白頭勳業正關心短褐長竿倚石林已有風雲生渭水豈愁夕照接秋隂原注太公望其二清流在眼未銜杯且賦新詩坐緑苔頭髮滿巾渾未白如何彭澤得歸來原注陶淵明其三騎驢恰似杜陵翁歸向南山路不同惟有詩人最憐汝解吟疏雨滴梧桐原注孟浩然劉伶荷鍤自隨圖獨醒甘葬江魚腹怪殺先生醉似泥死去解忘身後事小童長鍤豈須㩦題尚節亭詩卷今年三月過黃處士草堂觀其尚節亭詩卷感居處之無恆交游之有謝而處士之節自壯至老不易其守者固若是也夫為賦二十八字當年尚節亭中客多作南柯夢裏人辟地草堂頭已白階前青玉種來新三月豫過邑之東山馮處士要豫觀鄭先生所作東山指石圖為題詩一首白頭春晚到東山故舊相看有笑顔鄰縣東山猶未識眼明怪石畫圖間題顧雲屋山水圖吳郡顧雲屋工山水畫吾鄉鄭山輝稱其有出塵之趣戊申夏自鄞還吳泊舟慈溪之丈亭觀其山水諸佳處而樂之過餘姚為山輝門人徐性全作此圖以行亟其圖墨色有未足者性全以贈其友周德如山輝為題山字韻絶句一首辛亥春豫循海而遊過德如家德如舊嘗從豫者也出此圖請豫繼山輝題詩豫遂以次其韻虞公渡下丈亭山送目船窗幾往還今日題詩雲屋畫白頭一笑海雲間浣花溪圖何人住向浣花溪辟地無憂醉似泥却怪桃源回首處落花流水路還迷為周德如題鄭山輝蘭圖鄭公去後我重來二十年中白髮催留得故人圖畫在周家芳草有花開庸菴集卷九考證第十頁前三行案清明二字下疑有脫文此詩永樂大典所佚而浙本有之無别本可校附識於此
