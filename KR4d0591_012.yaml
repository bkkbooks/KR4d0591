body:
  text: 庸菴集巻十二元宋禧撰序送李元善序耕桑而衣食給力學而心志寧父母優游於其上家人和說於其下此四者天下之至樂也人之生斯世也於是乎具其樂豈不為幸民哉上之為政也使比屋皆然豈不為治世哉噫事近而易能理大而最切而求欲兼有乎此者恒以為難其有闗於世運乎其無闗於世運乎東平李君元善齒少而才茂志亷而行純好古力學之士也然而生事亦難焉其尊甫淹於下僚與母夫人俱老矣時巡徼吾州之三山俸禄之入僅支於豐年況有修豫之資乎元善恒用是以戚戚也辱予交每見即講學既而曰若世故何予之志亦粗與元善同而所處則又羡元善為裕於己也以予元善是羡其不幸之甚可知矣雖然親老無以紓其憂累重不能弭其謫唯生事不足然也然周於生事者徃徃委為庸愚以終其身則所值未可議其幸不幸也天其將啓斯人乎焉徃而非曲成之地政不足病也天其無意斯人乎亦將竭其力之所能未敢遽自棄也况元善徒以家貧親老為慮非如於四者之樂俱不足也元善之慮固大猶可以少安而問學況親禄將日厚乎若予者誠不可一日自寧也抑予之不寧猶將彊學以日新為幸則元善當視予以自慶而益勉矣嗟乎惟元善為可與道此也至正四年秋元善將以事適江東且因以求師友夫在行而學不輟非孜孜愛日者能之乎君所至見學者或有如予之甚不幸試以予言質之庶有發也送吴管勾序大率天下之物無恒伏之理是故有所伏必有所見見於今日者乃伏於前日者也當國家承平之時兵伏而不用矣非獨兵也黄金珍玉逺方瓌竒之寳伏於公藏私匵民生日用所罕見者焉非獨寳貨也人才之産於大江以北者布之職位而有餘南方山澤之間懐抱徳藝用之未及而佚於其下者固多也天下難作兵既興矣向之伏者紛然見於世而遐邦僻壤之才不得久佚於下而勞於進用矣噫是豈不可以觀起伏相尋之理乎四明吴君警敏達事變有志於當世久矣以軍旅之功為吾州稅使滿考謁選江浙行省調官慈溪之鳴鶴場佐其令丞治鹽賦以向者觀之亦可謂奮起其伏者也然君之才過衆人逺矣雖與一時之效用者奮起其伏而淹於筦庫之流未為得其所視氣銳力盛一舉足而躋於髙顯者寧無介於其懐耶雖然仕所以行道也道之行不行君其審之矣職位之崇卑豈在所校乎君固以家貧親老而禄於下位茍食焉不怠其事學焉益廣其才則自是致髙顯而行其道於所遇又豈不可冀乎吾觀善類之起伏固非偶然者也送宇文先生後序松江属邑二上海為邑自華亭以别以二邑而府所𨽻而上者即江浙行中書省焉彊實宋之一邑而賦之出至今益重宋紹熈間米之賦於秋者為石十有一萬二千三百有竒其季世有公田之役而賦以増國初理土田増於宋賦延祐間復理而増之前後以罪人家田没入於官其賦又再増之盖今七倍於紹熈者矣民其困矣乎其地之在東南者勢為髙灌溉之水弗利焉且復於海水之澨民漸墾而殖之殖宜菽麥間有稻其田者以雨而獲賦不可以恒舊以廷議得改賦菽麥量如米自是民益墾其地有司比收其賦行中書省以外舊數欲米之又嘗為漕餉弗給故所賦菽麥者以米賦米以量責缺賦焉其彊嵗每不熟視其災者又多熟之役於里者徃徃破家以償猶不足凡賦之積逋至至正二年十餘萬石其民益困而責之益急然終不能足於是行中書省擇官之賢能者覈其事而吾州别駕宇文先生實受其任至則考其圖誌究其吏牘察其輿人之言愀然歎曰松江之民受困如是乎復命丞相府請地宜菽麥者菽麥賦之漕餉之缺者以直當量災而不熟者蠲其征卒從先生請松江之民徳之矣㑹稽於越郡為劇邑且臨乎上者朝夕偵之斷公事不當理民即赴愬郡府譴立至南陽宋公為郡時其邑之官以事空用先生攝一邑事數月宋公天下名能官者明亷有威屬司恒慄慄恐獲罪於先生所行悉是之常呼為先生云繼守郡者台哈布哈公也公剛正其待下猶嚴唯待先生者如宋公數以旁邑事煩之決陳牘數十事素習吏者服焉嵊以鹺直十五萬緡属邑之業賈者營其課嵗久弊出幾亡直矣先生即復其直而箠不一施吏又服其能云先生為政所至民愛其惠觀其惠於外者固能吏所及而誠意感孚不假智力而庶績以成又有出於能吏所恃之外者矣宜乎喜聞樂道無間於内外之民也其授代而歸也賦詩以送者不約而集趙君素軒既以其惠於吾州而民不能忘者敘之巻首矣其所畧者竊著於末為後敘以誌夫喜聞樂道之意云爾送岑景融序至正甲申嵗二月二十六日予友岑君靜能之從子景融將有武林之游具舟於江之滸矣其姻戚朋友即龍泉山之椒飲餞之而予與靜能在焉酒酣俯江而望則瀰然之潮快然之風自東而來者若趣夫景融行也於是景融興席而請曰男子之始生為之桑弧蓬矢以射盖有志乎四方也某之齒已壯而局促乎一室之間無所事於世非男子為也今出而逰矣願先生賜之言以張某之志予因告之曰人之游而志是達也猶舟之行於水而途是趨也今子之行風無逆乎子之舟潮無背乎子之舟順是以徃雖一日千里不難也然亦知夫不難於此而難於彼者乎去此四十里有所謂七里灘者吾見其有經宿而不得過者潮之不與舟逢也又五十里有旴江焉又二百里有浙江焉吾見有數日而阻於其津者風與潮不利乎舟也行而有所難有所易天下之途皆是也使乗舟而行者見其易即躍然以進見其難即㢮然以退惡能至於其所欲至者哉雖然舟之行也有道帆櫓之是利資糧之是儲何難之不可待而進也景融之逰之道盍於舟焉觀之勵才業為帆櫓積忠信為資糧相時而動不以易而進居易俟命不以難而退於古之豪傑之士事於世者之所至而求至焉吾於景融之遊有望矣行也景融予之言有張於子之志者不在是乎時靜能藏器山澤而老矣舟之利帆櫓儲資糧而無四方之行者也聞予之言亦以為然遂書為送景融西遊序送張彦禧序王良善御御必取善馬馬之覆車者王良不以其徒力取也是故王良雖範其馳驅在馬不在王良馬之善馳驅者王良能取之不茍則凡取於王良者皆善馬也夫善御者之於馬尚然則善治者所取皆善類宜矣分省員外郎陳公以總督鎮兵臨吾州三年於兹兵民皆安之惟恐其去盖善治者也在其幕以佐治者莫非善類張君彦禧其一也彦禧敬慎慈恕樂於無事不要權以封已不逞欲以厲物其崇信古訓灼知禍福之原者歟當法制變通之際使彦禧偕羣有力者馳驅當世孰曰不能顧循循蹈䂓矩若無所為於其間者是誠何如哉非陳公不能取彦禧輩以佐治非彦禧輩不能得陳公之取也吾於是有感矣自古為治者治於任徳不任才任才不任徳未必無所快於心者譬若御者之於馬而唯力是取其馳驅長阪窮日不輟足而有餘力及遇險阨勇進無畏難又䇿而亟其步不知其覆車之禍徃徃在是也然則陳公之取善類彦禧以善類自處吾知其有燭於是理也較然矣彦禧以賢勞當陞而徴余贈言余雅敬彦禧於善御善治者又有所感故著其說為彦禧贈送樞宻經歴李侯再守奉化序漢循吏黄霸前後守潁川治行優甚及為相則弗逮人之能固自有概哉然自漢至於今千數百載天下為守者何限而霸之名桀桀在人口齒鮮有過霸者霸之能又未可少哉夫能於守不甚能於相非其心慮之有更局其質焉耳矣然則傳循吏者不以彼損此厚矣乎晉寧李侯元中前守奉化有能名選樞宻經歴吾州分院所涖也軍旅民人咸倚以重侯贊其治又有能名居吾州甫一嵗奉化人懐其治行不少輟白於公選又奪之去還其前所治吾州雖以其先大夫治與葬所在尤厚於侯而奉化固奪去留弗獲噫李侯再治奉化何其有似夫前後之為潁川者乎或嘗疑霸之後世道益不古循吏之行其諧於古益難以李侯觀之謂古今之道果有二致可乎然霸能於守不甚能於相李侯治奉化有能名進而贊治樞宻又有能名則設使居相位其有甚不能乎噫霸之能於守不甚能於相者局其質而學之力或有缺也李侯其質邁者歟其有學者歟兵革之後國家選賢能於内外愈難其人則侯再治奉化茍益有能名安知其不致相位而能於相耶雖然能於相者若伊傅周召則尚矣下之又奚敢為侯道哉樞宻管勾吴君某以余舊逰於侯之去徵言以送故有循吏之說而且以治世之為相者望於侯云代劉同知送危檢討還京師序至正三年天子詔修近代史之未修者而宋氏之事竊紀於江南草野間者甚博實採摭者之所資焉明年經筵檢討危君太樸奉使購求其書周流楚吴越之疆搜㣲抉幽極其心力之所及而後去宋之叔世其人才出於四明者為盛至今文獻猶有足徵者君至是留四十餘日得書七千餘巻以還於當時名臣若樓公迂齋猶以無可考其行實為憾餘姚於四明為鄰邑孫公燭湖趙公平菴之家在焉君徃還求其逸事而皆不可得其詳亦以為憾君吾故人也遇於是邦目擊君之所以為憾者其於凡賢人哲士言行存泯之際可謂深所致意者矣夫古之賢人哲士所以修於身而用於國其一言一行固可為後世法然亦無意於後世之名而為之而後世史氏以不得其一言一行著諸載籍為憾者此則好徳之良心而有志於史述者也且吾因是有所感矣賢人哲士既有以見於世其可以不朽者未及百年猶或寖以湮没則夫閭巷之匹夫匹婦秉義勵節而無所託者欲死而不朽亦以難矣然則任夫發潛誅奸之權者其又可以茍簡之心乗之哉此君之憾所以為慎其職者之所為也雖然遺憾於今者固當時職史者之失以有志者觀之亦足以為戒皇元一統之盛亘古所未有人才之出與氣運相為盛衰則今顯而廊廟之上隱而巖穴閭巷之間其有豐功偉烈潛徳卓行可論次史氏為國家之光者豈少也哉君還舘下凡執遷固之筆者為我謝曰聖天子慎擇史才豈特異代之史是修而已固有所宜汲汲盡其職者諸公無亦後之有志者之憾是貽也送王巡檢赴岑江序原註丙戌至正四年天子以河南北諸郡災於水民死亡不可勝數悼心殫慮日夜不遑寧惟拯其饑溺若弗及是憂倉庫之不足承於是募天下庶人之不𨽻刑籍者入粟授官有差而吾邑王君某以五百石有竒受九品官巡徼明之岑江希遇也天子法三代為治恒慎名器不濫以畀人四方臣庶饒於財不得自致於貴顯職競周行者乃於此時得以其所饒獲其所缺而慕望者兹非幸歟然世俗為其以貲進而易之見易者亦䠞蹜不自奮諱言其所自噫是特未之思耳三代以降論治必曰漢氏漢之賢能仕而得列循吏者亦榮矣班固傳循吏不過六人而黄霸者治行尤異霸之仕盖以入財進也公孫𢎞號儒者以賢良徵為博士位至三公而君子則有以議之以為霸之弗若以是觀之世之賢能困於阨塞則已苟有道路可進足舍詭遇媚竈羞妻妾者弗為皆賢能之所得為也今王君東海一布衣當聖天子慎名器之時藉先人遺貲獲官職於希遇其可不思所以自奮哉巡徼之職雖卑厲治行之首將在此矣黄霸何人也為之則是有治行如霸遭時如霸安知為二千石為丞相傳循吏於良史氏照耀竹帛者難致哉雖然君之抱負有出於霸之右者又非予之所能窺也解世俗之見姑以霸言之耳君其思所以自奮哉贈程隱㣲序原註戊子世談術家之善推命者必曰唐李虚中氏虛中儒者而術家宗之是得其學之一端耳韓子誌其墓稱其學無所不通最深於五行書推人壽夭貴賤利不利輙先處其年時百不失一二其說汪洋奥美闗節開解萬端千緒參錯重出星官厯翁莫能與其校得失自古術數之學無踰李淳風浮屠一行者而虚中與二子並著名於唐至今雖婦人小兒皆稱之則其於五行書信深矣五行之禀在人有一定不可易者其晚年乃得秘方能以水銀為黄金服之冀果不死而卒以疽發背死符其所夢噫虚中于已之壽夭獨不自推乎信道士說而於五行書顧自信不篤何也吾於此不能無疑於虚中矣金華程君隱㣲涉通羣書晚年隠於術家以所謂緒形五星推人壽夭貴賤利不利亦稱百不失一二公卿貴人慕而問者一以其法决之未嘗顧其喜怒而依違其說或謂其利一時之遇者不爾也隠㣲曰吾之遇不遇有命焉安能為人紿言命也噫隱㣲之術吾不能測其於虚中者何如以其篤於自信者觀之不賢於信道士說徼幸於長生不死者乎隱㣲於此可謂有儒者之學其足尚矣吾嘗讀日者傳竊怪司馬季主者樂於卜筮終身而不厭及涉世故乃知卜筮誠有可樂者吾願坐一㕓與龜䇿為伍日得數十百錢以養老母亦足矣更何望富貴乎夫推步卜筮固同一流也茍此之遂隱㣲其與吾遊乎
