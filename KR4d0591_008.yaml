body:
  text: 庸菴集巻八元宋禧撰五言絶句書懐四首晚雲天上白冬菊雪邊黄鬢髮絲絲短如何不肯長其二飲少不得醉吟多只自愁關情胡處士相過即相留其三老去須扶杖冬来早着裘翻思年少日曽為病翁愁其四近日得心疾遥遥夜不眠怪渠天上月明白照床前贈胡生斯悦童子樹邊立我行渠解隨拾得青桐葉愁來為冩詩梅川四詠黄牛髙似馬百畝賴渠耕誰送青絲鞚驊騮帶汝行其二小犬如猫小花邊撲草蟲南村多狡蘆葦暗秋風其三海風吹野樹獨鶻有時來莫動梅花雪天寒鳥雀哀其四老鶴東樓立何時渡海迴鄰人都在眼梅樹有花開題梅畫二首春回石巖底山翁竟不知天香破孤夢白雪在髙枝其二臨水一枝好疎花顛倒開也知貪照鏡不管路人來題水仙圖四首翠帶飄飄轉瑶環嫋嫋斜凌波清夜舞月落未還家其二珠宫雲影薄玉佩夜香寒明月能相照愁来只自看其三天風吹汝急羽化已能飛只恐凌雲去誰牽翡翠衣其四已得龍珠佩初從貝闕來衣裳渾不濕月下望瑶臺六月二日胡處士宅前即事水邊楊柳下雨後曉風前坐看平田緑關心大有年八月卄二日過徐氏書舍觀楊昭度所作壁上墨竹為之泫然因題詩一首可人今已矣塵壁見琅玕老淚為渠落西窗秋雨寒題百牛圖四野多青草江南春未深柳堤烟雨暗何處是桃林為王起東題李石樓墨竹遺胡達道王起東得石樓李侯墨竹一紙將以遺梅川胡隠君達道而徵予題詩前二年予與起東俱避地梅川依達道以安及還邑郭又與起東為隣而梅川曩日之事未嘗不數數以為言今起東于胡君有墨竹之遺盖不忘相依于患難之際而歳寒之交足恃也既題一詩又書此語以識予之所感云南窗冬至日雨後㸔琅玕為報梅川友陽和轉歳寒重過倪氏深秀樓十首二月初暄暖梅花爛熳開何人詩興動高閣為渠來其二前後山溪合東西户牖開初陽晴看畫新月夕銜杯其三客到青山裏新晴為暫留春來逢甲子又聽雨聲愁其四俗客無縁到前溪隔世塵三冬曽下榻猶憶董山人其五風流吳老子作畫愛梅花醉看西窗影更闌候月華其六滑公江海客頻到賀家溪采藥行雲際吟詩過水西其七朱老金鰲出王仙白鶴來長留詩巻在不棹酒船迴其八東家親戚好夜過太丘孫即為頻呼燭何曽怪扣門其九連夜張燈飲㣲酣用杖扶明朝下樓去病叟怕騎驢其十五載一登閣春衣近暮花後来知有幾白髪愧烏紗原註董山人字仲載天台人深于地理書吳老子吾邑季章先生也滑公字伯仁許昌人儒而善醫朱老字伯言天台人王仙叔雨熙陽仲伯也栝人王君皆儒者太丘孫倪氏之戚小山陳生鑄子範也性醇敏好學可愛賀溪即事四首為倪立道賦倪氏書樓北清溪曲曲流主人能好客醸酒續茶甌其二溪光流翠玉鳥影度清潭洗硯梅花落山童在水南其三西嶺青雲近時聞伐木聲千絲初掛柳二月未啼鶯其四洞庭秋水滿落木共誰愁雨滴湘妃竹啼痕到石頭峨眉春曉圖日出扶桑逺雲飛疊嶂深髙臺人起早半月恨春隂瘦馬圖駿骨由来瘦天西耐苦寒長安看花去誰為備金鞍題畫茅屋何人住秋林對晚山也知乗興出多在白雲間為陳子範題后泉書舍圖雨後泉聲急雲中樹色昏讀書應早起開户見朝暾顧雲屋效米元暉畫能畫佳山水顧侯天下稀尋常董北苑忽作米元暉題梅畫二首花樹小時見看花予白頭衰遲難作賦感舊只添愁其二花好年年見情親日日來誰憐湖上月照我夜深回題畫黄犬登秦鼎蒼鷹入漢羅草間眠可熟月裏夢應多題畫菜禾黍滿秋野飢人顔色回清齋忘肉味一笑畫圖開題畫水口橋堪度林間屋尚留秋来山色好相對有歸舟秦川八詠為王景善作桃源花暗疑無路波明看有天隨風紅雨暖吹落釣魚船柳橋垂葉巢鶯處飛花渡水時畫欄人獨立吟得送春詩竹坡地暖冬生筍厨烟曉作羮慈親年百歳三徑昔曽行菊徑霜下樽長滿風前髩已華秋來多落㡌客至共看花藥闌多種醫家草常懐濟物心當階偏愛䕶雞犬不能侵橘圃誰種江陵樹看来趣不同此中知有樂對奕候仙翁桐軒凉葉窗前覆新詩坐處題照來蟾影須見鳯凰棲芸窗書巻驅春蠧燈花語曉雞兒孫深院裏好學憶青藜七言絶句竹枝詞四首年年溪邊長浣沙白郎未識阿郎家昨夜西風打頭急莫教吹折白荷花其二門前冬青樹一株春夏秋冬棲老烏老烏頭白帶霜雪只管夜啼愁阿奴其三溪頭雨過溪水新一夜月明愁殺人誰將荷葉幾行淚滴向鴛鴦五色身其四牽牛花開河水頭黒牽牛對白牽牛織女自在天上住星影不隨河水流即事雕籠綉羽不知愁閒立西風倚畫樓别樹飛来頭白鳥驚心日影動簾鈎題山水畫山頭黄葉隨風落山下清江盡日流黄葉清江同渺𣺌沙邊白鳥為渠愁題蒲萄畫明珠元是鮫人淚秋水秋風日夜愁空許玉顔含笑看酒醒泣别下髙樓即事今年臈月尚無雪門外埀楊緑葉長一夜海潮河水滿鱸魚清曉入池塘四月十五日過東洲書舍見橘花賦詩一首東洲之東千戸家種橘五株開白花更栽九百九十五勝似故侯多種𤓰留題疊嶂樓疊嶂樓前山水佳梅花開處有桃花我來借得漁郎棹春夜題詩處士家竹石藤蘿畫雲中忽見金銀氣月下又聞鸞鳯吟清夜澗阿堪駐屐不須更入薜蘿深寄滑攖寧三首中秋虚約海邊來時序驚心白髮催吟到桂花愁未了放懐更待菊花開其二隻雞斗酒入江城稍見秋江悵望情不信勞生長偪仄海邊有日聽車聲其三江山荒落未應愁草木知名對晚秋誰道歳寒添寂寞梅花處處可迴頭題畫梅白玉堂前事已非緇塵漠漠翠禽飛誰知今夜江南月還向寒村照素衣題鄭山輝李石樓蘭竹畫巻山輝蘭蕙石樓竹二老風流識者誰江上春風苦蕭瑟却教宋玉不勝悲題唐𤣥宗出遊圖人如天帝馬如龍歡樂情深天寳中内苑行看春草緑不知宫闕起凉風題唐𤣥宗擊毬醉歸圖擊毬走馬不知愁還見漁陽鐵騎不醉夢春風吹不醒飛花已滿曲江頭題趙鳴玉效顧雲屋山水圖雲屋風流續者誰趙郎早被鄭翁知山川王氣胸中發誰道前身是畫師題畫沙草青青近石磯磯頭疎木轉斜暉孤舟釣叟垂竿坐逺岫飛雲帶雨歸題畫菖蒲九節真堪引歳華也知此物出仙家白頭為坐三生石青眼曽看幾度花為奉古元題鄭李二老合作蘭竹圖鄭翁山輝李侯松雲嘗為建初寺奉古元合作蘭竹圖一幅古元徵予題詩其上踰年不能就今年庚戌春二月卄四日過古元畫室出圖觀之予與坐客七八人皆掩袂而泣時山輝翁即世三日矣李侯前月末赴龍河于翁之歿蓋莫知也悲感之際遂援筆冩絶句一首李侯初上鳯凰臺鳯去能隨日影迴空采幽芳思鄭老遊魂春夜不歸來題紅白梅花月下吟詩客未歸紅紅白白鬬芳菲却疑桃李花開夜秉燭愁驚蛱蝶飛為趙子和題李太守墨竹龍泉山隂君子堂堂前竹影千尺長李侯胸次似老可炎天落筆南窗涼題畫緑隂黄鳥暮春初谷口人家樹下居野老㩦琴渡橋去雲山深處更何如題山輝畫兄事山翁四十年水南水北徃來便只教洒淚看圖畫幾處題詩暮樹邊
