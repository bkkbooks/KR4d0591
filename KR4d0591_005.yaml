body:
  text: 庸菴集卷五元宋禧撰七言律詩送諸道初該萬有歸寶林寺天末二郎思舊隱山中一老望歸來乾坤多被樓臺隔昏曉長為鼓角催月色清涼何處見夢魂辛苦有時回還鄉又在中秋後黃葉蕭蕭寶殿開送人還髙麗奉使逺離山水國稱藩先入鳯凰都素聞箕子明皇極更憶周家展地圖風舉天池鵬一息潮回遼海鶴相呼中華自古通殊域北往南來萬里途贈紫芝山人紫芝山人有青門種瓜之志而未得其所五口之家無一夕之儲不知造物者將何處之也今慕義而遊將以石刻集王右軍書墨本售凡好事者豫竊有感焉因賦此詩為山人道噫時既艱矣嵗既晏矣山人所嚮其有值乎其無值乎雖然吾故人見吾紫芝而讀吾詩其為前途之導者蓋不獨吾也紫芝其往哉有客有客王紫芝江空嵗晚欲何依試看墨本打碑賣勝謁朱門冒雪歸浙水文章依舊在晉賢字迹到今希年飢有粟知相易不用山中更采薇十二月草五日送趙鳴玉以其所畫遊南山雪滿空山二尺深可人獨步費幽尋政同沙漠餐氊厄豈有山隂返棹心不惜衾裯換斗粟誰言圖畫直千金南山親舊知吾意除夜歸來聽好音贈術者胡桂堂鄉閭見面不知姓江海傳聲未識君百嵗人生易相失五行家學許誰聞天寒北郭初青眼日落西山總白雲萬事忘言唯一笑謝君點檢更云云送赫彥明惜君逺去在新正貧病無緣敘别情臘雪已消三尺盡春潮初送一舟行天涯有夢尋鄉曲海角何年聽珮聲烏帽蕭蕭俱皓首萍流蹤迹歎浮生留題葉氏隱居正月草三日偕王處士起東王山人紫芝出城東門過葉君伯泰隱居及竹山渡先濟而往者郭廷羽伯泰之鄰會吾人同席而隱者張子仁也過午而還賦詩一首以贈伯泰生來兩過竹山渡早嵗經今已暮年黃認橘林寒雪後白知梅蘂暖風前麻鞋屢約通家舊草閣幽居覺爾賢作伴豈知江海客為誰激烈酒樽邊喜柯氏復舊物為賦詩一首天台柯君叔靜以童時喪其先公奎章閣博士所遺圖書等物之最重者無以考世德瞻親像驗家慶而恆以為大憾凡與親故語未嘗不流涕而皇皇焉蓋叔靜自知人事即不能釋于懷者有年矣山隂唐君彥常好義之士也于柯氏舊物之喪嘗得之以重直一旦見叔靜而閔其孝悉以向所得者歸柯氏不靳于是大夫士以詩文美叔靜之孝彥常之義者無愧辭焉豫雖不敏而詩之為作固不得而辭也奎章博士丹丘公輝赫聲名天厯中遺像還家兼舊物佳兒隔世識先翁趙人猶喜歸全璧魯史曽書得大弓好義今聞唐處士解憂孝子寸心同二月三日過姻戚倪氏深秀樓留宿賦詩一首福地重來白髮踈仙標誰復好樓居驚心世事三年後照眼梅花二月初解凍陽岡仍種橘生賢後代每收書君家積德由來盛親戚相過喜有餘為汪復初題四明溪舍丹山赤水洞天中水出長溪似白虹簾外鶯聲春樹緑潭邊鷗影晚花紅汪倫釀酒能留客李白題詩不負公欲看丹經坐清夜為豫下榻候仙翁為倪道原題九老圖何代傳來九老圖清平文物定何如水中亭館晴移棹樹下衣冠晝讀書閲世長於佳處住論交不與少年居可憐奔走風塵客田舍歸來白髮疏倪安道一樂堂高堂並坐白頭親兄弟相看樂意真對酒雲溪金奏響過庭華月錦衣新兵前骨肉誰無恙屋外田園况不貧家慶從來最慳得願將愛日答洪鈞倪煥章藏翠軒長松高竹覆春隂小院開簾翡翠深徑轉賀溪知幾曲枝巢越鳥見層林清狂未羡黃冠好少壯無愁白髮侵勳業關心書萬卷酒船何用客相尋留題上虞陳處士皆山樓老來厭住城郭中眼暗車塵千丈紅十日看山坐西閣半春多雨怕東風榻移更覺陳蕃好賦就那知宋玉工夜對青蓮須秉燭明朝有約遍溪東再題皆山樓髙樓百尺坐元龍客到山間度幾重雲薄霏霏含翡翠窗虛面面見芙蓉空中書寄仙人鶴月下詩成佛寺鐘三十六峯都在眼登臨更憶最髙峯原注皆山樓去丹山赤水洞天十五里劉樊升仙之蹤尚存樓之東一里許有山若屏障列其牖前山之外有所謂東明寺在其下風清月朗往往聞其鐘磬之音登是樓者恍惚若與仙佛接故詩中及之二月十六日過楊氏嘉樹軒訪三山岑宗昭嘉樹軒中久不來新年窗户為誰開生還再見三山客老去同觀二月梅天際相思曽聽雨花前一笑為銜杯清江難覔漁郎棹醉後愁吟坐石苔過亡友楊昭度宅見其諸子復習舊業悲喜交集為賦詩一首楊子宅前春草新老夫一過一沾巾城東聞笛經三載江上垂竿復幾人當室兒郎愁獨立通家子弟喜相親新年又聽書聲好竹徑幽尋莫厭頻為楊生簡兄弟題嘉樹軒軒前嘉樹為誰栽南國曽移此樹來孝子懷金寒果熟德人比玉暖花開侵凌冰雪寧無難粲爛文章定有才愛汝諸郎對書册東家桃李自尊罍題鄭山輝畫蘭醉眠居士何憔悴託意秋蘭似獨醒身後流芳頭已白人間看畫眼俱青湘靈夢寐同紉佩楚語愁吟可續經誰解烹茶留此老吳興文物久凋零為王漢章題鄭山輝李石樓合作蘭竹圖冀北李侯多晚興江南鄭老有春愁風潭對影來溪曲雲谷聞香坐石頭會合可稱雙璧在畫圖將見萬金收清華自古歸王謝所愛曽兼二美不為老圃生題錢舜舉畫瓜官路歸來兩鬢華誰知老圃樂生涯種瓜不作封侯想攀桂猶稱進士家一卷畫圖兵後物百年世事眼中花炎天客過三山下豈厭煎茶與設瓜三月一日再過楊氏嘉樹軒與岑宗昭王起東楊生宗權對酒既用前韻再賦半月春風兩度來楊家兄弟酒尊開西軒已為吟嘉樹東閣那堪見落梅此去緑隂還在眼寧貪清晝更傳杯吾曹相過多深意門徑無令長緑苔為聞人生題鄭先生李太守合作蘭竹圖石樓寫竹有書法山輝作蘭非畫師絶憐一老衰遲日虛憶諸公全盛時澤國凄涼今見此玉堂文采舊稱誰流傳後代應難得肯與聞人玉雪兒三月十六日會蘇伊舉于楊氏嘉樹軒辱示見寄詩一首次韻酬之老病生還九死餘杖藜寧嘆出無車五年不見先生面三徑相逢處士居芳草緑隂還自好落花紅雨已成虛白頭會合知誰健見説燈前尚著書過建初奉上人房城南僧舍我頻過塵世間情奈爾何雨後畫圖修竹潤春深窗户落花多齋庖燒筍留人飰醉筆題詩倩客歌緩步幽尋知幾度虛期杖履入煙蘿周信原南溪草堂南市津頭春水生南溪一里上流清堂前日夜生芳草海角平安過大兵先世圖書猶在眼故鄉山水更關情出門舟楫元非逺問柳尋花及晚晴周氏木香亭城南周氏木香亭人倚欄杆眼為青照夜白華春淡淡生涼緑葉晝冥冥月明不怕緇塵暗露重能令宿酒醒誰向東家看芍藥愁來簫鼓不堪聽三月草三日南門訪柯逸人及還遇張與權偕過建初佛舍觀畫題詩之際與權出舊紙索詩為書五十六字南郭春晴榖雨餘為尋山客過郊居留侯孫子歸途遇佛氏園林與世踈頻見赤松清夢裏同遊寶地緑隂初老夫已悟人間事爾祖丹經願起豫三月草七夜與諸友宿孫尚質書舍白頭病叟歸鄉里杖履清遊及暮春連夜城南隨處宿五更燈下有誰嗔穿花送茗呼童子隔屋聞雞報主人莫怪間情太真率去年辛苦在風塵與諸友宿城南即事吾邑東門外五里許有岱嶽行祠在小黃山俗傳三月草七夜其神出而還恆有火光若列炬自諸叢祠出送嶽神還明滅聚散雲霧間不可勝數者是其徵也每嵗邑人候而觀之以為常今年其夕周原信孫尚質范德梓郭廷羽趙自立張與權陳子範輩要豫宿南門外初不知觀所謂神燈者因賦詩一首以寓感慨之意云同宿城南有八人送春箇箇惜殘春空中何物明燈燭夜半髙歌動鬼神白雪滿頭猶激烈緇塵在眼復酸辛年華不及諸郎好作賦吟詩齒髮新四月草九夜宿楊氏嘉樹軒前月城南連夜宿今宵水北對花眠梅天未食楊家果夜雨都耕舜水田惡客不來成好夢大兵已過重豐年酒醒得句呼燈燭一丈紅葵在榻前留飲汪尚志成趣軒城東門外步晴暉柳絮無情作雪飛好客兒郎留午宴看花今日送春歸霓裳自愛荼䕷好雲錦誰憐芍藥稀念爾通家今再世嵗時歡會莫相違松雲軒幽人屋前多古松松上白雲知幾重蒼蒼寒色經年在漠漠春隂盡日封子規啼月許同宿神龍作雨能相從丈夫出處亦如此山澤巢居恐未容題張立中負米詩卷竹山渡東葉處士為我曽談張立中負米只期慈母飽還家不泣暮途窮太倉黠鼠無飢嵗老樹啼烏有烈風薄俗驚心那可説長歌在耳慰衰翁題沈錬師樵雲卷白雲可只自怡悅此語曽聞陶隱居有客樵雲吾未解通宵煮石豈成虛神仙對奕看何厭富貴忘情樂有餘應念當時賣薪者暮年勤苦讀何書五月十日楊灌園留飲後清漁舍且用梅字韻見教豫亦用韻酬之長懷載酒為君來夢裏寒花一夜開識字可期天祿閣吐詞何望廣平梅田園歸處松三徑詩賦生涯水一杯白首追從頻有約今朝又為掃蒼苔五月十日訪楊灌園于後清漁舍而唐景顔澄了然先生留飲至晚與了然還及汪尚志之門遇雨見留甚勤又置酒臨昏而散乃用向所留題韻紀其事梅天疏雨灑斜暉水北平田白鷺飛飲酒偶同諸客醉吟詩相伴一僧歸茅堂會合誰知好蓮社交遊更覺稀暝色苦催花底散南鄰留客意難違方氏山意樓山意衝寒欲放梅杜陵詩句為誰裁南山種樹人猶在東閣看花客再來風暖小春能自耐雪深殘臘未須開早年訪舊曽同宿白髮題詩愧不才五月草八日為梅川羅翁題會稽俞景山山水圖關情俞老草餘年忽見畫圖東海邊閲世兵戈成死别銷愁山水覺渠賢登髙昔有穿雲屐訪舊今無泛雪􅊑索我題詩羅處士卷簾梅雨落梅川贈杖錫寺安大愚長老四明山中仙佛居世界自與凡人踈藤蘿諸天映微月樓閣孤禪棲太虛金錫何年留寶地石窗有客寄丹書生平欲往已衰老路逺安得乘籃輿留贈郭思賢去年己酉夏余有龍河之行以衰疾留滯錢唐十餘日寓所與郭子思賢氏相近間與語若舊相識然其家世業婦人醫由汴徙錢唐已及三百年而其名不替以趙郭氏稱于逺近者是今年七月豫以考藝適閩道經錢唐復與思賢會乃為賦詩一首蓋塞其去年之請也種樹曽聞郭槖駝錢唐趙郭業如何名家汴水逾三世治疾邯鄲擅一科舊嵗客居頻晤語新秋藥室再經過暮年逺向三山去歸對黃花為醉歌過釣臺先生昔自吾鄉來愛此桐江雙石臺石臺萬古端有待羊裘一出能復回在越丘園成感慨入閩舟楫為徘徊豈知陵谷推遷後過客暮年青眼開大浪灘大浪灘頭大雨來樓􅊑不放四窗開低流江水來如箭直下山泉響似雷豈怕晚涼行李濕只愁秋熱簡書催白頭涉險緣何事考藝南閩愧俊才
