body:
  text: 庸菴集巻三元宋禧撰五言律詩胡氏斗室一室從渠小能容何限人孰知江海客不恠徃來頻紫竹長年好黃花臘月新我來時一飯避地作東隣胡氏一鶴亭一鶴歸何晚人間事已非野亭留獨立海月照孤飛落落新黄葉蕭蕭舊縞衣主人鷗夣逺對汝亦忘機贈岑敬先不見岑徴士驚心忽二年三山新嵗到一棹舊情牽執紼哀吾母通家見汝賢相過不相遇邂逅在梅川贈徐生下榻東軒夜看花北海春愁來驚嵗月老去厭風塵邂逅論文地留連避世人眼明衿佩合燈下肯相親歸雁歸雁離南海翩翩向北飛青春愁送目白髮淚沾衣萬里渠能往孤雲夣已違關山今夜月應為照清輝送友人老去復相見别來今幾年窮鄉君再到多病我堪憐渡水山雲薄當樓海月圓客邊愁送客頭白聽啼鵑送謝用敬白髮梅川客梅天看種田故人能再見徃事勝相傳海氣樓臺盡山輝玉石全秋來還有約雞黍願豐年徐氏瞻緑軒緑竹似君子長年不厭看沉吟風雨夜牢落雪霜寒開徑連書屋臨流足釣竿眼中高節在早晚候平安水竹軒水竹都堪愛幽居二美兼曉光浮釣艇秋色暗書簾已有江湖興寧無雨露霑我來聞好語酒量為渠添送天界寺書記聫季芳歸四明省母四明三佛地一出幾畨歸母在頻回首秋來逺寄衣燈前黄葉落舍上白雲飛愁極成歡喜禪心即此機送景徳輝水汎春江緑山圍曉郭青登髙花黯黯送逺雁𠖇𠖇禮樂興周室賢良滿漢庭從來多際會念子久窮經蘭室幽人種芳草宛在書室前天香熏夕寢琴曲入春絃耿耿同心友飄飄遺世賢相逢曾解珮山澤徃來便竹深軒曲徑晝隂合虚忩寒色交琴清風動葉衣潤露垂梢徑造不須問逺謀能解嘲相過待春晚留客筍供庖王生允承以其畫像求詩像畫古冠服手執書巻有抱琴者從其後于古槐之下游息焉盖其家有軒扁曰嘉樹云隂隂嘉樹下有此稱家兒冠服超流俗琴書樂盛時趨庭應有訓出戸政多岐念爾槐根立清晨有所思為楊灌園題鄭山輝天涯芳草圖春草生長坂幽人竟不知參差添翠羽蕭散長青絲西日高低照東風晝夜吹畫圖非鄭老逺道望渠思為徐自牧題李侯墨竹瀟灑金閨彦分明玉箸書天機元不淺繪事未應踈持節風霜際含香雨露初江南相别後清興更何如七月卄五日題崇安驛壁到得崇安驛初聞打鼓聲白衣知不悔烏㡌出相迎考藝思前輩明經愧後生徃還愁逺道老病重關情八月二日留題靈山庵靈山去福建省治十五里江郭待期入雲山連夕留星明俄近斗露下不知秋迢遞逢僧語虚空忘客愁勞生真似夣暮景願回頭還自閩中過鵝湖寺落日過鵝湖青山塔影孤當時論道處今我憶先儒舊寺烟霞窟荒祠草木墟躊躇多古意僕馬趣前途冬至前一日宿永樂寺水竹居次鄭山輝吳主一壁間倡和韵寒過冰上客陽復地中雷宇宙兵車靜山林佛寺開舊交多死去久别始重來知已三更語傾心一宿迴懐紀大璞二月朔過廣濟寺觀上虞士人送傅本真徽正音游學杭之普福詩巻有懐大璞講主且喜傅徽二子已還舊隠乃題詩巻末聞説芝山老虚名只累身城居長借榻官事苦勞人二妙陪寒夜孤舟别早春歸來詩巻好江海尚緇塵題釋交巻天台朱伯言當吳越道梗時挈家由海道抵上虞而居既而遭母夫人之䘮時同郡周宗性為稅官五夫為助治䘮事殊有力焉伯言感其誼著釋交一通以遺之今予見其巻乃題五字八句兩賢交有道同郡又同心度海秋風急聫床夜雪深親䘮埋旅櫬家難助籝金高誼稱詞伯雄文動士林次毛進仁留題張氏書舍韻歩屧幽居近論文畏友稀春郊風落㡌晚渡水沾衣對榻良宵坐題詩逸興飛雨聲生客悶㠶影待潮歸留題張徳言書舍連日勤相過寧知曲逕迂雨中春剪韭飯後夜投壺巾屨緇塵外琴書碧海隅竹林逢二阮古意慰狂夫過東山寺航毒海房留題湖曲藏深院山空出逺鐘森森春砌笋肅肅晚衙蜂僧老看孤榻兵餘憶舊松自憐花竹畔獨畏酒杯濃秋懐十首枕上憐衰朽江邊遣寂寥緑楊臨水立黄葉帶風飄扇去清秋雨帆囬落景潮凉襟何日遂愁思暫時消其二徃事隨塵夣新愁對物華暮年身少藥秋暑眼添花剥落風前棗荒凉雨後瓜相逢皆此况慰意野人家其三秋半江城裏砧聲夜不聞衣裳雖未換機杼豈無分暑枕留冰簟寒閨惜布裙蕭蕭桑葉畔誰與倚斜曛其四閒暇多髙誼艱難有俗情水深魚始樂林盡鳥須驚邂逅非吾事盈虚任此生已知齊物我漸覺一身輕其五秋熱愁無雨秋凉雨復愁衣單驚夜半屋漏聽床頭且得山家樂還看地利收吾生聊自遣有計補冬裘其六海角思相贈濠梁阻數陪十年袍可補千里客難迴范叔寒如舊王郎醉必哀高秋頻送目鴻雁幾時來原註時王遯庵留淮右其七舟楫何増價衰翁訪舊難只嫌前路逺轉失向時歡酒滿金波甕瓜寒玉露盤梅川胡老子秋夜幾相看原註予留梅川時胡白石待予甚篤其八憐才心獨苦恨别淚頻流又報吹笙客將為跨鶴遊鳴琴山水夜下榻竹梧秋頭白貪來徃誰能為我留原註吹笙客指王時敏其九燭湖秋雨過山閣定清凉髪為高僧白塵兼落照黄老懐同閲世空境更聫床有約酬花月良宵意不忘原註髙僧白雲翁也其十晚歲情偏切英才遇亦稀豈知麟在野翻使淚沾衣東閣朝相候南塘晚共歸傳經今已矣此事與心違原註此詩為梅川胡生斯厚作自題葉氏隠居壁上墨戯桃竹秋生笋藤蘿早着花暄凉驚物候老壯惜年華重過招賢里遲留處士家月明貪坐石天近欲乗槎次韻徐性全同宿小山陳氏書樓有作出郭天猶暖登山興獨深雨餘初衣褐秋盡未聞砧黄葉經過處青燈故舊心客樓頻對榻倡和有清吟三山王叔婉世善堂舊識王徵士今登世善堂青氊多過客白首未為郎作堰三山近修隄百里長傳家有遺澤鄉井豈能忘贈應生自脩憶汝童䝉日從親邑郭時七年今已過萬巻早相期世變㸔渠長河清嘆我衰功名歸少壯辛苦勸男兒次韻滑先生六月十六日宴集鄉校東齋有作汗流聊解帶心定復垂紳蕭爽論文地淹留避暑人杖擕桃竹舊衣製芰荷新共愛山翁醉相過作近鄰鄭氏竹亭空山喬木畔種竹傍溪亭水落霜初白人來眼共青也知棲獨鶴猶憶度流螢凉處誰相過題詩酒半醒為玉生題東軒早起東軒坐晨光海上來乾坤誰久住日月底相催梅熟從今喫松高自昔栽後生須有用書巻及時開輝谷上人東軒東軒何所有日出見光輝客去仍懸榻鐘鳴早着衣市聲聞下界山色悟初機時有看雲叟朝來暮不歸正月卄八日偕白雲長老過葉伯泰隠居浦逺春潮急風髙晚渡遲同來非舊伴一宿似前時雨對髙僧飯花題病叟詩新年行樂少重過荅幽期五言排律三月卄三夜與張與權宿建初寺燭下為賦生意垣十四韻同宿城南寺吟詩過夜分為誰揮我筆念爾好斯文靜裏含生意垣中謝俗氛當堦春草長入户妙香聞清液看朝露微酣倚夕曛豈知愁似海但覺氣成雲濓洛堪傳業岐黄可策勲天心常惻隠世事謾紛紜孰契鳶魚妙難同虎豹羣窮隂陽始復殘夜日將昕至理從誰究深𠂻為汝云張燈破昏黒得句慰慇懃屢聽城頭鼓長延鼎内薰一時留勝事明發報嚴君贈魏松岡俞復嬰二道士十韻予以庚戌秋九月卄四日自閩省還至崇安武夷宫魏鍊師松岡率紫清庵俞逸人復嬰以小舟偕予與四明桂徴士同徳等數客遊九曲以水淺中道而還是日予與同徳出溪口上驛舟向浙水東而歸舟中賦十韻以别魏俞二師云武夷山水窟自古集羣仙半世看圖畫三秋入洞天情親雙羽士勝引一漁船飯罷擕茶具經存及草𤣥雲巖風颯颯石瀬水濺濺九曲何如好中途不得前紫陽餘舊跡清氣望先賢世變仍竒觀吾衰已暮年分袪閩嶺下歸櫂浙江邊何日重相見神交諒有縁送承漢徳復徃濠梁兼寄王遯庵十四韻久客多親舊殊方似故鄉南還經鑑曲北上到濠梁賀老黄冠好莊生清夣長未須論徃事且復惜流光治圃甘辛苦思家付𣺌茫果蔬資雨露萍梗歴星霜脱屣神仙宅揮毫翰墨場浮生雖浩蕩勝地足徜徉為問吹笙客何當過草堂寄來承解珮别去憶聫床幾見桐花落又驚梅雨凉湖山長有待淮海尚相忘託子傳心素懐人覺鬢蒼詩成兼送逺離思滿斜陽挽汪太守二十韻五馬人生貴三衢嵗貢竒賢能真間有名節固無虧伏枕吾鄉日憂天故國時病來辭藥裹死去了心期既覺黄粱夣難求白璧疵漢庭曽有策周室豈無詩誰憶天人對空懐黍稷悲殺身多進士報主足為師同輩公無愧純臣世不疑當書班固筆已撰蔡邕碑舊治三遺愛凡民百爾思桐鄉知負土蒿里望歸旗有子恩情切逢人涕泗垂孝思難奪志哀挽謾修辭山郭迎棺久江船上瀬遲秋風鳴驛樹朝露泣園葵華表今聞鶴佳城舊卜龜幽明俱已盡魂魄更何之神道停飛盖仙遊看奕棋洞天雖可樂官舍肯相遺
