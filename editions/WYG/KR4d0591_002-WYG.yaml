body:
  text: 庸菴集巻二元宋禧撰七言古詩為浦江鄭仲涵題鳴鶴軒客舍炎蒸汗如雨終日昏昏獨無語白頭無復青雲心落月聞雞卧茅宇仙華山下神仙居何人夜半長讀書高天凉風落松桂鳴鶴在庭􅑵户虚學仙歸來幾人在尚想當時度遼海人間父子喜團欒誰似清門今不改我懐好音知幾秋一琴欲徃山中遊試覔康成書帶草看花何必到揚州為宋顯彰題桐江釣隠圖桐江釣絲長幾尋山高石出江水深當時羊裘已無跡今人誰得千載心吾宗之中有才傑家住桐江釣寒月徃年曽着從事衫已覺緑簑勝雨雪開元相業不可期人生行藏端有時戎馬驚心幸無恙沙鷗在眼俱忘機今嵗逢君鑑湖曲又復起身勞案牘黄冠謾憶賀知章老病憐予簡書趣子陵故鄉秋夢多歸舟還向鑑湖過在君客舍看圖畫奈此雲山江水何己酉冬還自龍河浦王漢章宅元夕宴集鐵字韻詩新年會飲元夕節秩秩賔筵日中設滿座烏巾異昔時在眼華燈待明月江梅尚覺花惱人野老誰言心似鐵當杯酣詠不成章嵗晚孤吟客歸越楊妃菊歌代人次柳宗岳韻秋花顔色如春花過客看花停小車玉環一去不復返游魂血汚愁天涯當時昭陽第一人沉香亭北酣暮春三郎眼眩傾國色惟聞芍藥疑太真金橋夜入嫦娥宫丹桂當秋香露濃晚節黄花想如舊同時不羡芙蓉紅何曽賞菊對妃子歌詞新進供奉李從來邪正莫相干秋花羞與春花齒漁陽皷響鐵騎嘶繁華一夜隨霜蹄妖芳在眼恨如海清秋獨立風凄凄金錢態慰彭澤令愛却中央顔色正頳顔只合屏荒畦舊族寧容雜三徑誰於隠逸加醜名覆邦尤物安足稱白髮黄花鎮相得故園擬作歸來亭題三香圖短歌湘臯仙人弄珠佩極浦更闌月華墜霜寒青鳥未傳書誰染春衣寄天外生來同芳能幾何兄弟相思夣中㑹人間愁殺紫荆花曽為田郎夜憔悴庚戌秋在閩中為新安鄭居貞題練溪漁隠圖澄江如練人如玉何年磯頭結茅屋垂竿已喜喚漁郎脱屣豈須稱宦族秋風蕭條來逺天沙際蘆花吹白綿釣月不愁中夜冷繫舟可傍西巖眠逺憶當年子真叟手把一犂耕谷口只今孫子謝簪纓千載相知寸心否會稽野老遊南州子亦去家成久留畫圖在眼為歌詠思鄉共立三山頭自閩省還至建寧作短歌行贈别胡彦功三山半月鎖秋院與子相聞始相見綉衣使者重斯文白面書生作良掾深堂四更官燭紅簾前白露零青空何人三夜見題目繩纆先歸青眼中知子胸中冨經史安定先生好孫子十載浮沉江海間憲府揚才遇知已野客辭閩歸㑹稽重陽已過風凄凄建寧城下復為别落日吟詩溪水西為王漢章題王山農畫梅山隂狂客王山農平生游戯梅花中梅花解作忘機友雪天月夜長相逢腰圍固有食肉相忍餓惟知罵卿相清癯仙質愛梅花冩神迥出緇塵上湯楊墨跡世上傳山農與之爭後先只今片紙不易得豪家豈惜黄金錢推篷之圖為誰作爛熳千花競交錯逸興可發文章家走筆花前風雨落我昔避地留梅川梅川孤舟花底眠冰霜滿眼晝無路桃源誰送漁郎􅊑王家髙堂對圖畫白首忘愁了諸債南風灑灑吹寒花徃事令人感時邁采烟山長歌寄贈新昌周銘徳采烟山者越之新昌之名山也隠者周銘徳居其上上有良田美圃綿亘三十餘里與平陸無異地雖僻而有利及逺朔南醫家所用白术其産也銘徳賢而好讀書以孝友稱于鄉其友胡汝州史孟通為予道其為人又為索予詩予以汝州輩之言足信而嘉銘徳之為人遂作采烟山長歌一首書以遺之異日或一徃游其山過剡見故人王公玉許時用二先生寧不為我助屝屨之需乎歌曰吾聞沃州天姥間又有采烟之高山山上之岡三十里平視沃姥浮青鬟其中隠者吾所羡身世長與浮雲閑種术可療九州疾種稻自給千家餐橘柑棗栗與桑柘種者不少資者繁雞犬走巷陌鹿豕游林園官府無事日人家總平安乃知桃源在兹土淵明所記欲徃難周郎一何樂居此勝居官晝則治家事夜則經史觀其人天性孝且友與弟同財慈母歡擇交朋友重髙誼急難可託輸肺肝我恨不一見今秋過江干胡史二生喜告我世有斯人為長嘆北閣髙樓送吾目采烟逺在青雲端嗟我老病畏塵俗剡中乗興逄時艱故人倘見招舟楫寧吾慳丹楓葉冷風嫋嫋清溪水落灘漫漫此時過門見王許青鞋從此躋巖巒作歌訂約在秋晚豈待娥江風雪寒八月卄五夜宿鳯亭夏叔方遺安室聽王時敏鼓琴夜分不寐叔方求詩題其素壁為書短歌一首夕陽之東秋水西梧桐不見葉萋萋誰憐今夜鳯亭客一曲琴彈烏夜啼洞門白雪照燈影阿閣清時看鳯棲古徃今來足相憶綵筆好將桐葉題春夜曲銀塘竒峯叠羣玉柳色暗連流水緑十二仙橋半月光翠閣青鸞鳴紫竹詞客酒汚宫錦袍題詩畫屏照蘭膏紅袖當筵罷歌舞鳯咮泉乾春笋勞酣吟為繫珊瑚樹烏啼西墻未歸去衆賔别院引明燭堕翠遺珠百花路暖雲氣宻鴛鴦衾不惜千金惜寸隂夣中寒雪侵天冷窗外楊花滿地深題雲屋山人大松圖歌吾聞丹山松一株盤根錯節鐵不如萬牛相送美材盡獨以偃蹇留仙都松根燒丹學仙者仙成已去千載餘夜夜丹光到今出泰山徒誇秦大夫誰能畫此古松樹中吳髙士身姓顧張燈驚起潭底龍揮毫堕落月中兎聲名世重定無虚人物天生真有數精靈邂逅宇宙間唯有造化知其故我夣羽人在丹臺飄颻緑髮春風回半年髙士不相見招我看畫山中來古松在眼為再拜重是抑塞之竒材一時作歌强衰朽千古少陵安在哉題顧山人秋江叠嶂圖歌顧侯避俗留越山髙情長在山水間秋堂夜半夣巴蜀孤帆逺逐西風還椎床呼燈怪遲緩萬里江山猶在眼澄澄素練天際長叠叠青鬟日邊逺寫來巫峽令人愁神女陽臺居上頭尚見雲隂含過雨可憐樹色送行舟地形何處接吳楚林薄人烟帶洲渚黄帽西來打鼓郎茜裙東去唱歌女畫圖不盡意有餘太平人物俱歡娱多愁宋玉在何許好賦顧侯山水圖題顧侯江山圖歌岷峨之山昔所聞下臨江水髙入雲層巒奔流到東海乃有巴蜀吳楚分暮年今見畫圖好滿目江山驚野老峨眉新月逺關情巫峽朝雲愁未了客舟幾日下瞿塘誰倚髙樓望漢陽人烟晚集磯頭樹天邊秋水去茫茫忽憶蘓翁遊赤壁西望蜀山歸未得當時謫宦尚逍遥月下吹簫從二客顧侯留滯東海頭放懐思上洞庭舟龍門連月坐風雨畫圖一洗今古愁為方處士題顧山人所作鑑湖漁隠圖東南山水㑹稽好鑑湖一曲歸賀老狂客幽人樂未央酒􅊑釣艇愁可掃𤣥英先生懶作官好與嚴陵冩懐抱垂竿竟入鑑湖中着鞭不上長安道古来謾説勾踐都越女色白天下無千巖萬壑有清氣相看未必如老漁適志生涯萬金藐忘機身世片舟虛功成頗怪鴟夷子却載西施浮五湖題顧山人畫古松歌能畫古松天下少昔有畢韋今顧老顧老作畫書法同或變真書作行草硬黄古紙一丈餘落筆古松随一掃糾纏黒白成文章恍惚隂陽割昏曉半年作客羅壁山但畫江山極幽𣺌亂葉㸃㸃晉書圓直樹行行秦篆小有人請畫松一株草書張顛合驚倒一株兩株八九株變怪無窮出天造愧我題詩勞寸心數日一篇方脫藁何如顧老畫古松游戯草書書法好題李唐牧牛圖金華柳待制天台柯博士為吾餘姚前貳守鐵侯題李唐郊原曉牧圖已三十餘年矣此圖今為吾邑陳生克和所得癸丑歳二月望後大雪始霽予過克和家見此圖適有所感因題七言古詩一首㝠濛烟雨郊原曉草色入天青未了柳林獨倚簑笠翁眼底三牛無大小三牛那得如五馬馬在亨衢牛在野故鄉長見牧牛人逺道空懐乗馬者江城二月雪滿空縣令騎驢纔勸農我過城南見牛畫李唐筆跡稱柯公柯公奎章監書日朝野歡娛躭紙筆當時名重柳先生典雅文章非勝質二老南還鬢已華題詩看畫鐵侯家應憐牛放桃林野尚憶鶯啼紫禁花古畫今人兩難遇今人已與古人去三公翰墨共流傳冨貴真如草頭露可喜陳生得此圖重是三絶今已無耕田讀書有餘樂更為子孫多買書吕山人養父歌新昌世家吕山人徳升隠居授徒樂于養父而克遂其志余聞而喜之為賦短歌一首授史孟通為徳升贈胡汝州周銘徳皆徳升友余為作歌者盖有信于二友也剡中吕翁能養父父今行年九十五朝朝尚啖肉一斤逺勝張公飲人乳吕翁愛日心何如一喜一懼瞻桑榆但願親如廣成子沃洲住似崆峒居我與吕翁齒相若每憶髙堂淚空落人生由來命不同短歌徒為吕翁作孤雲曲為韋惟善作孤雲度江江北來江南二月百花開錦衣笑看綵衣舞憶昔關心烏夜啼烏夜啼不肯棲五更遶樹飛千迴有兒頭白早來棲鳯凰臺仙家寳樹紅果熟口銜丹砂凌刼灰刼灰已冷甘雨來孤雲髙出楊花泥義猫歌故無為太守太原白公季清官浙東宣閫時家有二猫同時而乳凡生五子而居之各以所未幾其生三子者以己子就彼所并乳其二子其生二子者又復彼三子于其所而以已子就之于是五穉猫之育同一所而乳于二母無親疏彼吾之間嘻異哉君子謂白氏世積其善之祥也予聞其事乃為作義猫歌曰猫而人二猫育子無䟽親非知勉強其情真人而猫骨肉相殘家難交其面非若猫有毛中州白家積仁義猫有人心感和氣北平猫載昌黎文人而無稱良可愧良可愧負天地彼猫為獸非我類人胡弗如甘自棄挂劍臺行泗水日夜流千古流不休誰為挂劍臺名聲聞九州九州行人泗水過北來南去瞻嵯峨乃知挂劍一時事劍與古人名不磨古人重知已九鼎何足比况是三尺鐵肯背生與死徐君愛劍口無語季子心中業相許生死知心上國回劍挂墳前淚如雨墳前今有臺季子不復來當時寳劍安在哉無乃一夜隨風雷君不聞歌風臺上赤帝子寳劍龍吟哭蛇鬼神物變化從何來整頓乾坤須仗爾嗚呼神物去就上天所使隠見不常獲者有幾吾知寳劍勲業多季子徐君焉得而有此沛縣臺高風大起風起雲飛連泗水守四方得猛士臺兮臺兮可徒挂劍而已矣
