body:
  text: 提要庸菴集十四巻别集類四元臣等謹案庸菴集十四巻元宋禧撰禧初名元禧後改名禧字元逸庸菴其號也餘姚人元至正庚寅中浙江卿試補繁昌教諭尋棄歸洪武初召修元史所撰外國傳自髙麗以下悉出其手書成不受職乞還山復與桂彦良同徴主考福建故明史列之文苑中附見趙壎傳末然集中題桐江釣隠圖有云黄冠漫憶賀知章老病憐予簡書趣又寄宋景濓云當時十八士去留各有縁而戴良贈以詩亦有麥秀歌殘已白頭逢人猶自説東周之句則亦沈夢麟趙汸之流非危素諸人比也禧學問源出楊維楨維楨才力横軼所作詩歌以竒譎兀奡凌鑠一世效之者號為鐵體而禧詩乃清和婉轉獨以自然為宗頗出入香山劍南之間文亦詳贍明逹而不詭於理可謂善學柳下惠莫如魯男子矣黄虞稷千頃堂書目載庸菴文集三十巻又庸菴集十巻自明以來未有刋板故流播絶稀今浙江所採進者乃其詩集即千頃堂書目所云十巻之本而文集則已久佚惟永樂大典各韻内詩文並載尚具梗槩以浙本相較其詩惟多七言絶句四首詞一首其他轉不若浙本之詳備疑編録之時多所删汰其雜文每題之下各載年月檢勘皆至正間所作而入明乃無一篇當亦不免有所遺脱然世無傳本惟藉此以獲見一班尤不可不亟為甄録謹據浙本参互考証仍編詩集為十巻文集則别釐為四巻又從西湖志補詩二首餘姚志補文二首統題作庸菴集以備元末之一家焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
