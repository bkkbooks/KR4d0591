body:
  text: 庸菴集卷十一元宋禧撰序送徐彥威序士有曠百世而相感者矣則並生於世曠萬里而相感者又豈無哉不唯是日月麗乎天至髙且逺也陽燧方諸一燭其光而水火出焉何物之無情者於在天之象亦相感若是耶然則有識之士抱忠義涉艱險拔羣而往不失其所依歸於當世宜矣吾鄉徐君彥威自幼篤學有逺志既冠以進士業試弗利乃他進以仕一旦脫身變故繇海道走京師遂見今中書左丞相河南王於軍中即擢掾詹事院未幾承制除崇文監典簿以省親請歸江南王速其來今又上道矣彥威越人也自越抵王國不憚海道艱險於當世大人德業俱盛者知所依歸而有遇若此豈非忠義之心曠萬里而相感者歟夫有忠義之心者然後能憂生民慮社稷而一己之富貴弗謀也自寰宇弗謐國家遺材與無辜之衆委於塗炭多矣任天下之責急於削暴除亂者寧能遲遲其進而尚有所待乎不然人心之望已極而易於失之也彥威辭父母去鄉井感發蹈厲而復有萬里之行豈徒然哉至之日於所遇者而亟言之吾知其忠義之心必有濟矣富貴云乎哉送龍子髙序儒者龍君子髙楚之瓌材也蚤習進士業以易春秋之學試於有司有司類循常踵弊不肯一顧取雄傑之文以勵士氣子髙既不得志遂不屑就試席圖進取而教授草澤之間以自樂幼強記今已四十餘備涉變故而經史百家之編舊所嘗過目者歷歷能暗誦不遺忘其資有過人者矣往嵗冦陷楚地子髙即盡室抵吳而又抵明越其抵越也寓吾州之嵗為多雖見禮公侯貴人而樂居於山野躬率家僮藝菽麥果蔬牧雞豚力桑麻以佐衣食費間徒步入州郭好事者留飲酒為文章輒酣醉歌吟竒氣溢出不可羈束及語當世事則未嘗一啓齒一側耳與焉其處患難又有人不能及者矣今年春子髙在海隅聞皇太子奉征討之命駐於晉冀總兵少保公朝夕在左右進天下賢才以輔中興之業於是幡然有所發公侯貴人因資其行而浮海達焉可為世道賀矣夫在春秋時晉楚之強稱於北南然楚之材實用於晉者楚不能用其材故也晉以得材而盛楚以失材而衰材之有益於國也若是哉今九州四海之地皆國家版圖所載其有貢賦不入之處非春秋之國受封王室者比也子髙以瓌材拔衆能潔身去楚亂客明越既久而一旦有晉冀之行苟有所遇不有過於春秋人材之遇於上國者乎且進退以時易之道也子髙困於退者已極矣其退而進進而亨以深謀逺略佐太平之復不在斯時乎豫以子髙習知春秋之事而又明於易之道故於其行樂贈以言而且為世道賀也送胡正辭史景洪序余友胡君正辭及史君景洪皆世居餘姚與余同邑而早交者也正辭之子南字汝周景洪之子慎思字孟通又皆自幼異羣兒而豫所愛者也既冠皆以家貧急於養同時為書佐行御史臺以積勞從事部使者於廣西有祿亞其掾將行皆徵贈言於余余以其世同邑吏同舍奮發同其志有海道萬里之行又同舟以濟而同處以食其祿是二人而一體者也二人既一體而於余又同為通家之子則同其文辭以贈不為簡矣嗟乎汝周嗟乎孟通皆余所冀其逺詣者歟自國家慎所任南士之不得入臺憲久矣二子何幸而有際於今時也哉然以余觀之所貴入臺憲者以得行其志也得行其志而善弗揚惡弗遏逆民之好惡積鬱之久而一旦有所發安得不為姦宄之乘也天既悔禍於已極而有弭禍者出焉則臺憲足以行其志者有冀矣當兵難大作嶺表幸無事而憲綱之端重自若也今二子從事其間豈徒以臺憲之入為幸哉其志固有在矣吾聞黃金明珠象犀玳瑁諸怪竒之物皆於南方萃焉二子之志苟有在吾知其於是物直與土芥同視而不為逺詣者之纍也二子勵乎哉送倪叔懌序夫業不可不慎也而士之業最優然業士者又有浮華篤實之辨而氣化之盛衰繫焉是故氣化醇厚則學成而輔世者往往皆篤實之士而浮華之習不能勝嗚呼篤實之士恆學其所當學舍是以浮華而陷禍者衆矣况可厭士之恆貧賤而徙其業乎吾鄉倪君叔懌業士而篤實也向者干戈之際益以家貧親老為憂不能無藉於授徒之力余嘗解其憂而喜其卒業於士也以謂考亭師友固嘗仕進矣當其時不以仕進為樂而以授徒為安以今觀之則授徒之安正未可以仕進易之况未始仕進者乎叔懌於余言既無所逆其心矣今又從上虞魏氏之請而客授得其所吾見其學益充業益富他日輔於世莫非篤實之所為而已與物並受其福也若余者固亦厄於生事之不足而學失其時矣猶欲勉強其所當學資友之篤實者以䇿其庸怠而叔懌今逺我而離處也則余不能無私憾矣雖然叔懌豈恆逺我者哉其有以䇿我者未可量也於其别序以贈之送應仲珍序三代而降天下士大夫以名節為重之死而不失者莫東漢若也東漢風俗之美實倡於嚴子陵先生一人而已先生生於餘姚耕釣於富春至今其髙山窮谷野田長川煜然有光而不泯茍知慕其人者雖去數千里而逺孰不欲一往而觀其遺迹蓋風神氣韻之相感不以古今逺邇而有間也餘姚吾鄉也吾鄉有書院曰髙節其耕釣之所有書院曰釣臺皆以先生而見重於天下者也釣臺在今建德之境建德去吾鄉數百里耳其邑人應君仲珍以至正庚寅冬來長髙節髙節有海地十頃而嵗入甚艱仲珍以七口之家旅食於此滿三十月行橐竭矣不能俟代者之至而歸之亟矣嗟乎昔者嚴先生託於仲珍之鄉亦客耳何其能優遊於雲山江水之間也使如髙節不能久留仲珍豈能遂其耕釣之志也哉且仲珍之寓吾鄉不可謂非仕者也仕而祿食其與秉耒而田投竿而漁者豐約有間矣而仲珍嘗與吾語則反有羡乎彼而無樂乎此何也嗟乎以仲珍之通經學古才長而識敏年幾五十為一教官於荒涼寂寞之濵使其妻子奴僕恆有飢寒之慮欲逸心肆志自同於古之抱關擊拆者不可得不待仲珍之言吾固知其無樂乎此也然其於嚴先生素慕其人而得以縱觀其遺迹視吾雖生長其鄉未得一至其釣臺之下而悵悵以思者不猶足自釋乎於其行餞之嚴灘之上以其志而為之歌曰有田而耕足吾食兮釣於江水坐磐石兮磐石兮坦坦余何為兮仕而蹇懷故鄉兮思古人盍歸乎來兮樂山水以繾綣送盧彥文序魏郡盧公守吾州之明年豫自逺方歸謁鄭君元秉於北郭元秉方賣藥以養老母且聚子姪輩教之通經學古是務里中子弟知問學者亦皆受業於其門其廬之東偏有所謂山輝軒草樹森秀旁有流泉啓牗而坐不知其居之近市諸生藏修其中莫不有自得之色有一人豫不之識又獨氣貌嚴重鏜然作北人言所辨質落落皆經史大義竊異而詢之則太守公季子字彥文者也自是數造山輝軒必與彥文語良久二年之間益得其為人蓋其志不藉父兄致顯途卓然欲以經術自奮者歟今年春太守公以年滿七十一旦致印綬民踵門固請則固謝曰吾老矣今而後知聽訟之勞未若聽吾兒讀書之為樂也公寬仁樂易豈無意於民者哉其所以為子孫久長之計固不以濟世之務而忘之然則彥文卓然欲以經術自奮乃公之所望於為後者乎嗟乎公卿子弟固不可不知所以學也彥文雖不欲藉父兄致顯途然當今顯途之致者往往乃公卿子弟茍不學而仕其不陷於欺君病民者鮮矣嗟乎公卿子弟固不可不知所以學也彥文則知之矣他日事君而無所欺治民而無所病不基於今日所講學者乎若豫則世力農者也固當服耒耜以共公家之賦然私心猶願借舊家藏書於耕穫之隙伏草舍燭松薪不計其功而讀之有激於中則扣牛角而疾歌若是亦足自適乎否也彥文行余無所贈姑序納交之由無己之志是誦益為公卿子弟好學者之勉云爾送蘇生序天下有學而宗孔子者莫不設官置吏以治其事於官吏之間司錢榖而躬其會計出納之勞者曰直學直學之役滿以三十月則以儒者所業試於部使者業中其程然後受檄行省若宣閫得為所謂教諭學録者國家慎於用人南方以儒出仕者舍進士則直學耳故直學於進士雖有徑庭而繇之以躋清顯者往往有之人亦艱為之也至正初復行科目之法於寒逺劬困之士有所優既以下第春官者為學正若山長又選諭録員於鄉闈恆貢之外於是繇直學滿考者乃補小吏州縣間而校官不復得為矣吾里蘇生自幼以謹厚嚮學稱於州庠長而為直學既滿考自念當補小吏日抱簿書奔走俯伏羣有司之前稍失其意受鞭笞泥塗馬矢間乃奮然歎曰大丈夫茍有志何趨不可到顧為是耶遂發篋取舊所讀經去之郡庠從師而卒其業父母喜而資之且祝其有所就而歸其姻戚王孟陽為徵贈言於余嗟乎生之歎誠是矣人固不可不擇所以自處而負天地父母也夫賦形萬物中而得為人類幸矣人而得為男子為耳目聰明者而生於衣食厭足之家而父母祝其為賢無為不肖非幸而又幸者乎於是而不知所以自處則為負天地父母之所以生我祝我者矣李斯之為人也固不足道然方其年少時為郡小吏見鼠之居厠與倉中者而有所感歎乃從荀卿學帝王之術入秦而致位三公則於自處貴賤之地亦知所擇矣特其學術不明急於功利而不能堯舜其君民是足罪也今生齒弱而質美未及辱為小吏固已奮然發歎欲以大丈夫自處而卒業於舊學此其志何如哉雖然為學有道取聖人之經而讀之無所踐而不驗其實斯為善學者矣不然徒知從荀卿而學焉者則於為人賢不肖猶未知所自處也以生謹厚之質逺大之志從明師郡庠而日學其所未至則居廣居行大道如孟子之所云者不亦可望乎余既韙生之行又重孟陽之請於是乎言送宋彥中序邢臺宋君彥中世家子也以父廕補吾州稅使稅使有恆課而無恆祿彥中為之課足於官衣食不足於家而其才有餘於所用也噫吾因彥中有所感矣古之仕者之見用於當世也官焉而任其才祿焉而養其生才無所任是謂徒才生無所養是謂徒生任其才而養其生當世無負於仕者矣然於仕者之子孫也又世祿而不世官官惟其才不才而官者未之有也後代之任官也不惟其才而惟其世者有矣以世而官官而無祿者亦有矣以世而官官而無祿無祿而有才者亦有矣以世而官官而無祿無祿而有才有才而無負於當世者厥惟鮮哉彥中之仕於斯也課足於官衣食不足於家而其才有餘於所用當世無負於仕者乎仕者無負於當世乎噫吾因彥中有所感矣彥中授代而去吾鄉岑子輈率其黨為歌詩以餞而徵序於余余因彥中而有所感也於是乎言送王伯貞序聖人之用兵所以救人也而人有死於兵者蓋其不幸也非聖人之心也用兵而不得聖人之心而人之死者始衆矣是故聖人未嘗為人易言兵又未嘗不慎於戰也今天下以盜為患不得已而用兵數年矣聖天子未嘗不以殺人為憂盜之歸順者且宥其死况於非盜者乎然則盜宜平而未平兵宜息而未息任將帥者不得不反求其心韋布之士不得不懼於言兵而以仁義為説也任將帥者反求其心而得其所以救人者韋布之士懼於言兵而有啓於將帥有德於生民吾知天下之盜不足平矣況陷惡於山谷者乎四明王君伯貞才媺氣鋭嘗從鄉先生問學而懼於言兵者也以功巡徼處之美化告行於常所來往且曰吾之仕所以圖為學也即仕有所不樂當繇處省親於溫遂謁郡守寶公退則讀書鴈蕩山中而仕與否未可知也嗟乎伯貞吾閲韋之士亦衆矣何伯貞有是志也昔子張子蚤嵗以孫吳之説見范文正公於邊公以聖賢之學勸之而卒有所變矣今伯貞之見寶公也吾知其非獨不言兵而公有以成伯貞之志將不在於美化乎伯貞之志成而有以救人將不在於用兵乎於其行預以賀之送靖觀序靖觀東海婦也其家世業儒未笄時大父異其警悟授五行書長而益深其學推貴賤禍福往往竒中中年家祚落從其夫滄洲生逰江海間滄洲亦儒家子得其妻之術強記能文章過之簾市售其術問者則皆之靖觀氏靖觀清而弱日推數人得錢給薪米即謝客過其門者莫不目而駭之豫嘗與之語而知其人矣蓋非婦人也觀之言曰吾不幸形婦人以生生而不能以婦人自處又其不幸吾之生重不幸矣而以生年月日為人言貴賤禍福是特以生吾之生不知吾之生者果惟言取乎不然形吾纍也然吾之生也天固假我以形而實無形也泄我以言而實無言也以言求吾猶索日於影况於形乎且吾之為吾亦非吾之所得吾也吾特吾之耳又不知吾之見者有以吾之不吾者觀吾否乎然則世之罪吾者固不少於生吾者也噫婦人之言有是哉觀乎觀乎吾其可以婦人目之乎吾聞藐姑射之山在北海中有仙人居焉肌膚若氷雪綽約若處子乘雲氣御飛龍而遊乎四海之外大浸稽天而不溺大旱金石流山土焦而不爇吾嘗疑之今乃知固有其人也人惟見水而能溺火而能爇不知溺我爇我者又有所謂水火者焉靖觀室處者也千里而逰數年矣蓋無一日而不在水火中也不為其溺且爇其乘雲氣御飛龍而逰乎四海之外不自千里者始乎觀乎觀乎吾以姑射之仙望之矣居北海之中彼何人也送毛先生序至正十七年冬十有二月余友上虞栁君景臣寓書於余曰天台毛先生世業儒其祖架閣公以科第起家而先生不願仕進讀書田里間以樂自號緑野翁最深於地理書間遊四方覽古今塜墓於名山大澤之間考王侯將相所自出以驗其心目之所得者今已七十餘而筋力尚強為好事者穿林木踐荆棘陟降崖谷未倦也留吾邑頗久嵗宴而歸以吾與子最善敢徵言以贈余曰管郭之學固考亭師友之所嘗講論者也而禍福之徴蓋有其理何可以不信毛先生以儒者之學而燭理於此其見信於人可知矣雖然以今觀之則又有可感者焉毛先生當承平時周流四方其山川形勢人物氣焰固能記憶也兵興以來雄藩大郡蕩為草莽不知王侯將相所出之地其一樹一石不徙故處否嵗時復有子孫擁車騎列牙纛來省視否禍福之徴果一一可推考否遼逺阻絶者其事不可知矣而目前達官小官能捐軀報國奮出千萬人之中而沒於鋒鏑者豈無其人其骸骨得有所藏否妻子不流離凍餓道路否毛先生為人擇葬地於忠臣義士尤所注意也不知有相求而遇者否乎苟有其事名公大儒當秉筆而書矣奚待區區之言以為贈也
