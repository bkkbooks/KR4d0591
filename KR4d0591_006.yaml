body:
  text: 庸菴集卷六元宋禧撰七言律詩過崇安縣留贈稅使夏文敬今年秋七月豫有閩中之行草三日入分水關其暮抵崇安縣驛而宿明旦遇稅使夏文敬于縣郭中文敬益都人年未三十既問豫姓而笑曰疇昔之夜夢造藍明之先生之廬先生不見見一人狀貌若吾子者在其門外官道上吾問曰子何姓曰姓宋其夢若是吾與子雖並生于世而南北之居相去數千里而逺且生平素不相聞何夜之所夢旦之所見其容其姓其邂逅之地無一之不有徵耶是可異也豫聞其語亦有樂于中乃賦七字八句詩一首以贈之老年觸熱向三山暫宿崇安驛路間與子平時初不識何緣昨夜獨相關浮生邂逅皆塵夢逺道馳驅有汗顔官舍設瓜知愛客看花更待暮秋還為閩省掾劉宗海題瀛洲圖三山有客瀛洲仙一住人間今幾年桑田變海望歸路天祿校書懷昔賢頗怪令威成白鶴還期太乙泛青蓮題詩為坐榕隂下病叟南來也可憐留題鼓山丈室鼓山閩之勝地也豫故人用明師主其寺焉去嵗用明自浙左赴鼓山豫嘗為文以送之今年秋不意叨與考藝亦有三山之行既事主文江右吳蕭二先生而下凡七人約遊鼓山豫與四明桂徵士同德先至山下以俟及暮諸公不至乃登山入其寺宿焉與用明語至夜半有足感者其夜風雨俄至煩熱頓解遂賦律詩一首明旦録上鼓山丈室就以為别八月草四日也棘闈半月閉秋暑巖寺幾程登暮雲勝地江山兵後見髙天風雨客邊聞送師東海新春别秉燭南州靜夜分賔主三生端有契靈源重會讀吾文閩省宣使張文中伴諸公遊鼓山索詩為贈江海諸公早晚回勝遊都向鼓山來同行喜有乘槎使相贈慙無作賦才先到後還空卧病東瞻西眺更徘徊閩中驛路通吳越嵗晚相思為折梅八月草三日至鼓山夙病復作述懷山僧錯喚病維摩傴僂提擕入薜蘿鄉里自憐扶杖久道途誰笑折腰多度關峻嶺應如昨送客安車又若何回首會稽雲霧外二千餘里費奔波送人赴惠安驛我到三山路二千經過驛舍總安然異鄉送客緣同郡樂土為官屬壯年入貢好迎天外使觀光應識海隅賢亨衢流轉非前日錦服歸來鏡水船題牧羊圖高鼻羣羊塞北來晴原花竹是誰栽牧人何處占春夢草徑應看落日回好雨一簔當有備豐年四海已無災翻思持節蘇卿苦風雪憑凌白髮催毗陵卞孝子永清幼失其母于兵難求之十三年得見于龍河軍營中而未遂迎養臨川危先生為序其事今年秋豫遇永清于閩出示其卷有感于中為賦詩一首早失慈親最可憐周流兵甲十餘年只期見面黃泉下誰使驚心白日邊喜極還臨大江哭愁深未挽小車旋平生情事終難了孝行潛通咫尺天休寧任本立水南山房水南山人讀書處溪光半浸松蘿山白雲變化朝暮裏黃卷逍遙山水間休從乃祖釣鰲去好與山人騎鶴還三山秋色淨如洗四海兵車今已間九月十五日自三山驛還至懷安驛廬陵劉允恭以詩贈别次韻酬之官船送客勝漁舠千里涼風入布袍秋院校文同點檢晴溪歸路重遊遨月圓楚澤鄉情逺水落閩關石勢髙竒會翻成離别恨暮年更怕往來勞九月草三夜留題武夷宫殿壁大王峯下武夷宫九曲溪邊一徑通身到名山頭已白眼明秋日葉初紅神仙定在虛無裏兵甲曽棲澒洞中秉燭題詩留過客浮生蹤迹似冥鴻九月草三夜宿武夷宫燭下為魏松岡提點題閩中士大夫送歸武夷詩卷入閩逺作三山客回棹重經九曲溪洞口仙人如有約燈前詩卷為留題苦吟豈似彌明句昏照還資太乙藜當暑送歸吾不及秋宵下榻聽金雞留贈諸葛仲華金華名族諸葛仲華為曹娥驛官三年于兹矣以亷能稱被其惠者眷眷焉惟懼其去其借留于上官者甚衆仲華之修職于斯者可知已豫去嵗有龍河之行往還過其驛仲華禮甚恭欲得區區之言豫固心許之矣今年秋以考藝適閩冬十月還與仲華會日昃未飯為具食私舍不獲固辭瀕别率爾成律詩一首以謝其意去嵗官船此往還詩文曽許寸心間官程今復經閩嶺驛舍相迎對越山一飯情深分薄俸片帆家近破愁顔去官送别寧無語只恐回轅野老攀為孫尚質題山輝翁蘭蕙圖蕙花江上逢冬至又見鄭翁蘭蕙圖落筆十年身後在懷人三絶眼中無陽回后土幽芳發雪滿隂崖衆草枯看畫幾畨曽墮淚題詩此日更愁吾送岑山人北山猿鶴久相違城郭黃塵上客衣雨雪虛無知臘盡江山寥落索詩歸梅梁水涸魚龍逺麥隴沙乾雁鶩稀更待明年春草緑相隨湖上踏晴暉人日有作新正雨雪數朝同屏迹茅堂未覺窮人日晝隂開晚照老年寒極向春風荆榛豈阻尋芳客葵藿還親避俗翁元夕張燈看不逺試聽簫鼓月明中送趙仲容還會稽江郭往來三十年黑頭相見甲兵前生平畫馬不能走垂老瞻烏真可憐客舍茶甌龍井下故鄉書屋鏡湖邊擕家八口始歸去春水為浮天上船正月十五夜趙鳴玉還郡城與豫語别遂賦詩送之新正泥濘出門遲百感春愁只自知送客正當明月夜看燈不似少年時冥鴻歸路聲何逺老驥征途志已衰簫鼓城頭偏惜别圖書船畔一吟詩二月四日久雨始霽過水北王大本家觀山輝翁春草圖為題詩一首江上茅堂春雨多春來野色竟如何老夫朝朝望白日隔水茫茫生緑莎踏青屐齒畏泥濘垂白鬢毛愁棹歌何時乘我五湖興翡翠蘭苕迎釣簔嚴氏蒼雲軒我住城南對北山子陵墳墓在山間每思髙節空回首得見諸孫為破顔鄉里未尋書屋去客途曾向釣臺還連年奔走頭添雪愛汝看雲日日間題潘氏壁今年春三月四日豫偕邑子周原信王公逺過越溪潘鈞輔家鈞輔與其季鈞茂情好若舊留宿其東軒張燈置酒主賔甚樂戊戌己亥間以避地常挈家纍輩寓其家今十三四年矣舉觴道故舊且觀故太守李侯墨竹亡友鄭先生墨蘭喜戚交集而于鈞輔伯季之更世變能不失其常者尤有感焉為賦七字八句詩一首秉燭書于壁以俟知我者和之昨日正當三月三今宵水北共清酣幾年不到知懸榻上已初過喜盍簪兵後放歌誰尚在燈前痛飲我何堪君家兄弟情如舊頭白相看得笑談為王雲谷題王若水畫吾鄉王雲谷先生奉其母夫人官中吳時錢唐王若水處士以其親年過八十且有祿養之樂為作萱塘竹雀圖贈之其年至正癸未也後二十有八年豫過邑之東山雲谷出此圖以觀感慨之際為題五十六字江南四月薰風涼鶴髮慈親坐北堂萱草花開百憂逺竹林筍生三尺長野鶴哺雛依翠石水禽得伴傍銀塘年光物色都堪畫此樂人間不可忘今年春三月六日過東山哭故太守汪公柩公之子彥舉留宿書樓其禮甚恭其意甚勤感嘆之際以詩贈之故侯遺愛民猶憶有子承家我復過徐孺生芻慚自緩謝家寶樹奈渠何兵戈每覺東山逺絃誦還聞北里多老去憐才情轉切燈前為汝賦菁莪三月七日留題黃草堂壁我愛風流黃草堂暮年重過惜春光虛聞錦樹燒銀燭不遇芙蓉見海棠舊客關情愁逺道好花在眼醉斜陽生同壬子頭先白莫怪髙歌似楚狂三月十四日夜宿周叔榮家留贈自歷風塵三十秋重來海上為遲留青春誰解看花去白髮真成秉燭遊逺迹雲山仍近榻驚心海月正當樓眼中諸友能相慰舊日牙籖尚肯休和韋惟善登龍泉山舜江樓二首絶頂曾題處士詩後來丞相有心期都知在眼為霖雨誰向天心聽子規北客逺來文似錦南人老去鬢成絲相逢倡和春雲裏此日登臨異昔時其二山郭遺民憶有虞江樓落日眇蒼梧登髙能賦韋公子在昔成名葉大夫南浦農蓑雲萬頃東橋漁網栁千株眼中風物還淳朴未讓桃源入畫圖同滑先生飲酒周氏荼䕷亭分韻得堂字總愛瓊芳戀夕陽南鄰老子最倣徨惜春幾度行花徑擕酒先期過草堂天上夢回青瑣闥月中愁破白霓裳百年舊物兵餘見莫遣清隂出粉牆題白太常三歲時手書卷後太原白應章以其曽祖太常竹梧先生三歲時手書八卦名及諸名公贊美詩文卷示元僖元僖伏玩之際乃知太常為一代偉人者非獨間氣所鍾元遺山先生于其作字時以七言古詩美之大有期待而果如其言蓋太常生有異質實能成于問學故也近代王文公謂金溪民方仲永者世𨽻耕生五年未嘗識書具忽啼求之即書詩四句并自為其名其詩以養父母睦族為意自是指物作詩立就其文理皆可觀者邑人竒之然以其父利其慧日環丐于邑人不使學及其十二三時見之令作詩不能稱前時之聞卒之泯然為衆人乃為著文一篇曰傷仲永今觀太常幼歲墨迹及聞其生平所就有賴于學而後然則知其與王文公之所傷者所以有霄壤之辨于其歸也元僖于是竊有所感為賦詩一首書于卷末云世家白氏出名儒三歲能書有竹梧喬嶽千年降神秀樂天七月識之無琮璜琢就藍田玉騏驥調成汗血駒不似半山傷仲永遺山期待應時須賦白氏瓶中梅太原白子芳都事居其父無為太守喪時常折梅一枝樹新陶器中其華既落而布葉結實蔚然有生意當世諸名公以詩文美之既成巨軸矣其子應章乃索豫詩辭不獲為成五十六字墓門有梅氷雪殘令人斷魂誰忍觀思親窮廬白侯苦失本孤芳青子酸生成可曉神明意感應難同怪事看也為吟詩鐡心動江頭笛聲梅雨寒過張氏書舍憶昔我年三十三讀書日夜在城南能親魯史留三載誰似張翁愛兩男閲世青氊猶在榻回頭白髮不勝簪壯年蹤迹同春夢愁破梅天酒半酣為蘇養正題子猷訪戴圖剡中秀異吾所思剡中隱者多故知平生扁舟未能往幽興及門空有期雪夜勞人誰好事秋風看畫我題詩只今莫説無安道王許風流似晉時題赤壁圖百年身世幾扁舟如此江山兩度遊人物當年惜良夜畫圖此日對新秋仙翁得向清時樂我輩難消白髮愁孤鶴不來明月好空思天際大江流八月草三日偕白雲訪西隱于龍泉山閣西隱將有四明之行與豫語别遂賦詩送之龍泉髙處為誰登曲徑幽尋樹下僧黃葉又經秋夜雨青鞋曽踏歲寒冰西來山閣隨雲隱東去江船待月乘邂逅浮生還惜别吟詩落照倚蒼藤白雲軒小齋素壁積霜雪虛窗恍惚含白雲西山朝氣出龍窟北海秋隂來鶴羣在舍雙親何太喜檢書一榻有誰分東家愛爾書聲好雲裏吹笙不足聞次韻趙德純阻雨小山有作兼簡徐性全并謝陳氏諸親舊雲谷重來遇二公故鄉情合異鄉中髙樓聞笛三秋盡舊榻吟詩幾夜同短髮飄飄渾欲落深尊處處不愁空獨醒却負諸親舊聽雨留連復聽風送讓無吾住定覺寺兼簡衍福玘大璞講主江邊佛寺近孤城曽向江堤幾度行暮景難留林下伴逺途猶繫世間情千村黃葉時時落十月清砧處處鳴惜别老懷兼憶舊潮來南浦為誰平冬十月過上林鄉為岑孝亷題鄭山輝雜畫就用其韻重過岑家懷鄭老畫圖歲晚見春榮芝蘭玉樹昔同賞山澤布衣今獨行十月誰憐衆芳歇上林曽聽早鶯鳴南樓日色令人愛洗硯題詩重有情冬至後三日留題方允彰南樓方氏樓居兩度過南山在眼興如何衆丘皆作兒孫拜樂土猶聞父老歌愛日當樓書滿榻寒溪繞竹水盈科陽生幽谷人重到更待中秋月色多十一月十二日過竹山胡氏書舍觀王時敏梅畫賦詩一首竹山書舍王徵士長説鄰翁與往來翰墨曽揮銀燭夜兒郎總慕玉堂才故人一去雲霄逺老我初過歲月催冬日南窗對圖畫梅花臨水為誰開十二月草九日承滑攖寧先生韋惟善與鄉中諸親友以豫初度之辰致禮見過因賦詩一首奉謝老去歡娛復幾人歲寒山郭對黃塵艱難人事都非舊貧賤交情倍覺真除夜敢因初度飲同心故向暮年親城南行共千花笑已有江梅著早春
