body:
  text: 庸菴集巻七元宋禧撰七言律詩留題岑氏隠居冬十月既望予過三山岑西峯隠居嘗再宿焉明月十五日自游原將過梅川西峯長子子輈又要子宿其家西峯蓋善士晚歳恒誦佛書不涉外事是日夜予與其父子語至雞鳴不睡明日别去留題律詩一首白頭兩度過三山三宿西峯紫翠間明月再圓潮滿海寒雞亂呌石當關論文半夜新知樂齋佛殘年老子閑榻下諸即總清秀雲中丹桂許人攀聞宋思賢等將還有作半載江頭悵望頻逺途音信苦難真雲霄忽報辭鵷鷺郊野還看養鳯麟别去孤舟秋節晚歸来斗酒歳華新海隅山角長相見歌詠同為擊壌民新正即事日色相催暖氣回千家寒盡舊爐灰南山臘雪新年在東海春潮昨夜來野老獨登髙閣望江梅逺背故人開感時懐抱無今古强學詩翁近酒杯葉貴中自天台還臨濠寓所正月晦舟過餘姚江上與予别五載而會話舊之際悲喜交集因賦律詩一首寄題其寓所曰竹居者末意蓋有所祝也濠梁種竹已成林客舍凴渠伴獨吟蝶化南華春夢短鶴歸東海暮愁深别來每得平安信老去重傾故舊心江上雷聲交二月錦䙀為汝憶抽簪為陳山人題顧雲屋大松圖顧侯秀異天所種胸中有此千尺松深山大澤久藏器層冰積雪當嚴冬羽化登仙巢老鶴樓居閲世對亢龍小山桂樹何年種譲爾獨立青芙蓉羅壁隠居圖雲屋為方溟逺作玉山有客尋佳處金谷何人比此山溪閣幽居青樹裏園泉逺落白雲間燈明春夜看圖畫地主年華集珮環隔水桃花深幾許洞門斜日未須關為方允恭題顧山人龍門雪霽圖羅壁山形似金谷今人誰繼古人遊龍門雪色入鳥道顧老霜毫追虎頭髙情脱畧風塵跡逺眼𠖇迷草木愁客底敝裘能忍凍畫圖不許世人求與顧山人宿羅壁方氏停雲樓贈詩一首雲屋山人雲與遊十年為客海東頭蛟龍過處石窗冷鴻雁來時水國秋燈影獨留羅壁夜雨聲長送玉山愁桃花流水春隂裏白髮關情共倚樓原註顧氏吴中所居號玉山草堂者題髙氏萬緑堂路入郊堂度石橋可堪詩思晚蕭蕭隂連桑柘凉如雨氣接風雲逺似潮紅紫一時隨過客清和四月聽吹簫梧桐葉上題佳句乗興重來不待招雨中遣懐老去追游轉覺難盍簪誰復共清歡江山暮色孤城暗風雨秋聲四月寒路逺情人長駐屐樓空餘子獨凭欄可堪鼓角催昏曉萬古心期只自寛雨中席上贈承漢徳濠梁有客意相親風雨孤舟泊水濱攜具入門添我恨烹茶為主奈家貧從游誰作觀魚伴就語今逢裹飯人秋晚能酬江上約豈無雞黍待嘉賔鄭山輝春草圖悵望情人立水南水南風日正清酣踏青已去空遺佩拾翠重來可盍簪當日佳期猶自惜暮年别恨更何堪夢中緑暗關河路愁破天光動鬱藍為承漢徳題淵明采菊圖髙眠不道羲皇逺爛醉猶知晉室尊三徑有花歸栗里千山無路記桃源去官彭澤皆真意避世秦人亦寓言老去忘憂忘未得秋來采菊度朝昏五月十四日過平應仲書塾其夜至明日雨不止有懐藍溪許月山化安真淨源天晴獨跨蹇驢來凖擬書堂一宿迴野色幾年違白首雨聲半夜落黃梅南山樹對髙僧立東浦花隨處士開親舊有懐難晤語出門流水沒蒼苔贈沈生從訓王氏園林好讀書山光野色入幽居鄉關百里騰騏驥燈火三更落蠧魚江動春暉慈母别天開文運大兵餘苦心能答三遷教青眼誰譏野老疎過聞人叔勉家賦詩一首今年六月三日予與陸谷賔過聞人叔勉家叔勉有南山之行未還其母夫人隔屛障語其童孫以天熱固留過午叔勉臨出時有屬故也叔勉之家約甚而處之恬然事母孝謹躬執薪水之勞而問學不廢予于諸生中尤愛而閔之屢過其家不忍費其為具也至是予雖不留又見其一家待我之心真切若此谷賔亦為之感嘆以謂叔勉有是美質而獲乎親其于古人之學豈難進哉予因賦詩一首紀其事且為叔勉學古之勸云觸熱相尋北郭生昨朝已有南山行在堂慈母隔屏語愛客小兒開户迎凉館苦留憐老病暑途竟返負真情誰知剪髮陶家事竹簡千年有令名題朱叔經怡雲樓秋來江上望甘雨念此山中多白雲樂土稻粱何早熟靈湫膏澤許誰分怡情豈羨陶𢎞景足飯能留鄭廣文為倚髙樓愁野客關心豐歉對斜曛原註壬子歳七月十二日謁豐城掲先生于慈溪朱叔經家登其怡雲樓時先生之子平仲以教授館于家他壌有不雨之閔而山中田榖已有熟者其鄉多龍湫故詩及之為方出翁題顧雲屋大松圖去年寫松小山下今年冩松羅壁中千尋竒材拔厚地兩度苦吟愁老翁羽蓋青天落冰雪龍門白日起雷風虎頭筆力今重見神妙能分造化功龍門眺逺圖誰冩龍門眺逺圖風流顧老出勾吳河中天闕爭髙下海上雲山半有無杜甫神游應自惜安期仙去待誰呼未須東望成長徃小住塵寰慰老夫秋日過郁仁齋翠深軒與顧山人夜坐有作風霜高潔暮秋天誰住紅林白水邊愛畫能留吳下客過門為治越中船葉埀山果臙脂重石出溪毛翡翠鮮底憶桃源深處宿樓臺春夜對花眠顧山人畫髙峯特立翠芙蓉疊嶂飛來宛似龍雲度雙關如有約水流千磵總相從秋林谷口安亭舘曉寺巖阿響鼓鐘老去可堪城郭住關心草閣傍青松龍門大松圖虎頭孫子氣吞虎龍門怪松身似龍落筆蕭梢朔風起潑墨慘淡飛雲從無疑杜老歌韋偃謾説秦封臨岱宗天生異材久盤屈青眼千年纔一逢長江疊嶂圖病翁曽上大江船晚發江心佛寺邊不見青山歸海去可憐白日枕書眠畫圖雲樹看今夕客子風潮憶徃年誰似杜陵詩興好浮家吳楚到西川張氏梅花塢粉牆如雪花如雲花間月色白紛紛曽留野興老夫宿更愛天香春夜聞皓首彷徨詩未就緑衣歌舞酒初醺堪笑西來葉處士到今猶為索吾文為徐性全題萬壑秋聲圖誰愛玉山草堂靜畫圖尚見千古情懸崕迢迢來磵道隔林蕭蕭聞水聲西窗書巻白日暮中天石壁丹霞明何人逺住萬松下百頃風潭堪濯纓為趙徳齊題林壑隠居圖每懐羅壁在城外更愛草堂臨水西洛客曽將金谷比杜詩偏向玉山題重陽風雨看圖畫暮景雲林過杖藜多謝眼青留下榻自憐頭白聽鳴雞觀陳履常所藏春山圖有懐雲屋山人有誰能尋山上山兩翁逺在溪林間雲生大澤龍蛇窟風度重巖虎豹關長松開花落日在幽人采藥幾時還别來又是三千日尚想月明聞珮環邵氏秦湖隠居秦湖隠者邵平孫舊日生涯不復論垂釣花間親白鳥種𤓰海上似青門還知教子書千巻不願封侯酒一尊蓴菜鱸魚秋更好扁舟何處覔桃源題畫小縣曾聞鼓角傳雲山深處夢相牽年來還愛丘園近老去偏于杖屨便樹遶石頭知客路巖迴谷口見人烟攜琴出郭茅堂宿誰復含愁鳥道邊長度翺清碧法師住蕭山淨土寺朱雲巢以送行詩巻見示遂題一詩于後早年頻過蕭山縣暮景新知淨土師夢筆江淹留勝跡講經支遁喜文辭鐘聲曽聽孤舟夜詩巻今題落葉時何日相随朱太史百花深院話前期贈徐常髙風尚憶南州士後輩堪憐北郭生嵗晚孤城多雪意夜長深巷自書聲楓林已落清霜重梅蕋将開逺照眀念汝黑頭須努力起家黄巻答昇平二月十二日即事書懐新愁底與舊愁深塵世猶闗野老心二月江村三日雪百花時序半春隂閉門實信袁安卧歩屧虛期杜甫吟此際懐人徒自切那能裹飯徃相尋三月二日過陳處士家為題眠松圖驚蟄已過寒食近元龍樓上㸔眠松春来雷雨雜冰雪凍合深山㽞卧龍作畫興随隂壑逈吟詩愁對暮雲濃子規啼處同誰聴花落芙蓉第一峯天台謝用文寄恵竹扇以詩謝之竹皮作扇出天台情重幽人遠寄來蕉葉已經寒雪長桃花徒趂暖風開十年塵俗懐髙節三伏炎蒸見異材問訊仙翁總瀟洒夜凉眀月在瑶䑓柏山䑓柏山胡氏有光輝爾祖尚書近代稀舊族子孫今散處故郷丘壑豈忘歸壮年有暇親黄巻清晝無縁羡錦衣樹色嵐光堂上滿先賢風采未相違次韻喜雨有作吾邑自五月梅雨不降及夏至種有未入土者皆以為憂是月廿三日甲子乃雨其夜雷殷殷而鳴土俗有梅霖之望矣明日予過城南僧舎客有賦喜雨者予次韻和之夜来一雨足銷憂五月晴江露逺洲三日為霖還可擬重梅應候未宜休城中米價増連月海角民生望有秋僧舎出門同一飯加餐知我此情不任從義寄恵新昌石鼎以詩謝之石鼎斵来天姥骨江頭寄到野人家難逄道士重聮句可待先生為煮茶飢嵗不堪烹故紙老夫亦欲煉丹砂得随采藥尋仙去却用相擕入紫霞六月喜雨有作大雨時行六月天舊疑月令信今年秋前共喜先完廩夏至曽憂未種田市價减錢吴下米江行有水浙東船蒼生已免填溝壑皓首猶知對聖賢代人挽汪太守二首深谷為陵路轉迷病軀無復計東西心随歸雁春天逺淚落啼鵑夜月低漢史已知稱召杜周人誰復哭夷齊生前不食甘㝠寂應許諸生奠隻雞其二對䇿妙年書萬巻承恩晚莭粟千鍾生前未貴龍頭選死後纔安馬鬛封曽為王風歌黍稷定歸仙境主芙蓉野人洒淚甘棠下尚憶當時雨露濃七月廿日與永蘭亭納凉極樂寺贈詩一首江水蒼蒼江栁黄閉門誰與坐茅堂儒冠徴去容吾老佛寺吟行得此郎桐井浮瓜秋葉暗荷池對竹晚花凉可堪世界猶炎熱樂土同㳺意不忘題畵松四首潜蛟出壑石門開夜半風雷動地來落筆一時驚變化吟詩三日為徘徊忽思采藥龍蛇窟更欲消愁琥珀杯偃蹇自同樗散者誰言山澤有遺材其二秋宵有夢到蓬壺萬里浮雲一寸無白兎在天開舊窟蒼龍出海弄明珠氷霜還憶諸朋友風雨堪憐五大夫睡覺不知眀日事客來却見古松圗其三昂霄聳壑勢崔嵬知是何人㡬日栽百世恩深山澤叟萬牛力怯棟梁材雲邊雪色随風落海上潮聲送月來留得幽人長作伴北山猿鶴不須猜其四老夫欲學服松花曾到丹山道士家千尺紫蘿埀落景一聲黄葉出層崖采芝商皓身何健辟榖留侯計不差三月山中花滿樹願留人世閲年華為山隂朱善之賦三山樵隠昔日會稽朱太守至今孫子住山隂家聲不耻為樵者書巻還存濟世心山入雲寒㸔虎跡屋連夏木聴鶯吟逄時衣繡非難事苦學何愁嵗月侵贈天台僧日東巖東方日出照寒巖絶頂孤禪離衆凡海色已随丹鳯至天闗不許白雲緘眼明經巻開蕉葉雪落空花滿石函當暑上方過野老清晨風露濕春衫㸔雲樓梅川胡斯敏舊與其季斯厚同居其宅之東樓斯厚既早世斯敏乃思之不置以㸔雲名其樓取杜工部詩語以寓其憶弟之意也今年秋九月予復來梅川嘉斯敏䔍於友愛而又得朝夕在其親之左右以養志為樂固有在者矣遂従其請為題詩一首云髙樓海上㸔雲飛有弟仙逰竟不歸夜雨雞鳴曾共被秋天雁過為沾衣杜陵生别情何異康樂清吟夢不違還勝思親太行客朝朝綵服在庭闈胡生芙蓉館觀花一川秋水照芙蓉山院開窓晚色濃使客星槎何杳杳天孫雲錦自重重仙家作主當時話人世㸔花此日逄應喜髙堂偏好客佳期須費酒千鍾九月晦宿王氏書舎早起即事有懐遯菴翁而喜有東歸之音因賦詩一首睡起西齋感物華清秋重宿故人家花開白槿兼紅蓼日出青雲帶紫霞鳬舄歸来今有約雁書傳到定無差每懐知已令人瘦歡㑹誰憐暮景斜
