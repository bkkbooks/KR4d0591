body:
  text: 庸菴集卷十三元宋禧撰序贈李生序原注庚寅始余聞四明李生遊江海得祕方能為人治竒疾皆命日而愈然聲容冠服不能撼貴顯知其名氏者特山谷田野之人余固識於心猶未之信也去年春姻戚應生者生疣於目表大若核桃而長未巳别六七日而見則帖焉如平常問其故乃李生為之也余於是欲一識其面目今年余與河南郭子振讀書吾鄉圓智寺夏五月李生過余而留焉子振舊病痔良苦以余之言從生治之浹旬之間若實熟蒂脫而其疾去矣噫世之病疣痔者無間於王公貴人而得其祕方者甚少也疣痔之病不甚於龜手者乎古之人能使手之不龜者足以取富貴况治疣痔而得其祕方如李生者乎然李生不矜功不責報與人言必依於忠信孝弟無富貴利達之望則其不遇於王公貴人者豈果係其聲容冠服之間乎子振吾州太守公之子也其親舊多大官巨族以生能去所苦先以錢帛又圖報於後生辭曰富貴貧賤吾自知得甘旨以養老親足矣尚何有願於其外乎子振益嘉其志遂徵詩吾黨以彰之余為題其首贈徐君采序原注辛卯前草年余始交山隂徐君君采君采時以龜䇿隱市㕓中郡之士大夫皆與之往來其擬遊京師也安陽韓先生以文贈之且稱其雅好琴書而於岐黃氏之書則未之習也數年來余於吾鄉聞君采客錢唐能治痔取竒效馳聲公卿貴人間心竊異之去年秋會諸錢唐逆旅以他病求君采治者日集其門益異而問之則曰吾於張仲景著論以習驗於人矣噫君采久不見何其多能若是耶今年余復至錢唐見其藥室所張皆德其愈疾而贈以文者則君采之於醫信有濟人者矣余觀士之懷仁抱義者莫不有志於當世而求其得行其志者恆少也余行年四十矣固知仁義之施於物者惟醫猶庶幾焉然學之已晚懼其不足以濟人而適足以纍人則于醫又不能為己自今以往徒羡君采醫業日益精濟人日益衆亦足以自快其心而忘其貧也廬陵邑長寶侯以其伯氏嘗危于末疾得君采活之而不忘徵文於余以贈之於是乎言贈許仲舉序原注甲午疽發於背危疾也天下之人無知愚舉知而懼焉然其始發也甚微其可見者僅如粟豆比天下之人又往往忽焉而治之不蚤以致不救者多矣茍於其始發之微即艾以灼之不痛而至於痛痛而至於不痛其疾易治且易愈也三日不治至五日五日不治至七日十數日則橫逸肩背壞爛不可收拾至是而欲治之亦難矣幸而毒未內洞而遇善醫者必盡去死肌易新膚凡百無所觸忌庶乎可冀不死俟其血氣內充而外固飲食起居復其故常非以嵗月計不可也然則人有是疾治之不蚤而得生全者特幸耳吾鄉吳易之先生年已七十而背發疽雖覺之三日之外然治之不甚緩治之者又得里人許仲舉能循古法不敢以私意乘之故收功於旬月之間無甚難且危也吳先生疾既愈不忘仲舉之功思所以彰之而徵言於余噫緩急難易之辨非獨治疽為然也天下之事其類此多矣以作難者言之其初迫於不得已而人自為計其後徒黨稍衆而聚於山谷又其後形生勢長抗官軍犯城池而生民陷於塗炭貽慮於廟堂之上不淺也天下方以治難為務其緩急難易之辨與治疽者相類而於余心適有所感于是乎言為趙仲容贈孫仲麟序原注丙申山隂趙君仲容寓吾州孫君仲麟氏有年矣仲容在州郭數與豫相見今年來不見仲容者半載一日遇諸途問曰何久不見子也仲容曰吾病疫兩月幾與子不相見余駭而悲之且自責不知仲容病也又一日仲容過余曰吾有請於子子無吾辭余曰何謂也仲容曰日者厲疫流行受其災而至危者莫吾家若也吾家無旬月之蓄而親戚僮僕無一在焉吾既病甚吾婦吾二子又相繼病病甚於吾四人者同卧一室相顧待盡微吾仲麟氏盡為鬼矣仲麟於吾非親戚之屬也乃憂形於面與其諸子日夜營救候視而迎醫禱神與夫時其飲之涼熱節其食之多寡凡所以活吾四人者無所不用其極微吾仲麟氏盡為鬼矣仲麟于吾一家真所謂生死而骨肉也然吾寠無所為報願子敘其事章仲麟之德庶幾吾之不忘於心者恆在人耳目以為美談也余乃嘆而言曰古者死徙無出鄉鄉田同井無旅困之家也出入相友守望相助疾病相扶持無不恤之難也良心之存乎人者不失故天下和平而民不夭札也自人欲橫溢各溺其私大防不修而至於崩決瀰浸震蕩之中父子不相保夫婦不相守而淪胥以亡者何限其禍蓋有原也仲容去鄉井而寓吾州既旅困於此矣又盡室以病而值時之不易幸而有仲麟之相友者為之扶持也嗟乎世之病疫如仲容之至危者不為不多不幸而不得如仲麟者為之扶持而至於夭札者亦不少也使天下之人皆如仲麟之存心則親疏上下之間豈復有失所者乎然則仲麟之事固余喜聞樂道而仲容之命不可辭矣雖然余與仲容交而病不及知困不能恤仲麟之德人也余固樂道其事而又有愧焉則區區空言之為於仲麟之行事何如哉贈余益之序原注乙未今年秋吾弟元儀疽發腰背間玩而不治歷八九日寖腫而大背若負斗米重乃懼而求治於人習灸者曰猶可灼艾遂實艾若食指大灼至百餘壯始痛不可忍乃止然猶慮其危而求治之心未敢遽已也友人慈溪髙君仲寶曰吾邑余君益之善治疽疽發於人身自頂達踵隨所在而治之無不愈其法不灼艾不用刃唯以其先所傳蜀僧祕方藥摉其內毒從水穀道出於臟腑無所撓而腐於外者有以易而新之未腐則不假外療能保完若舊治疽如余君未見出其右者盍往迎之即走迎余君至視其疾曰是易為也多此火攻耳五鼓作丸藥啖之少寢覺患處若手搔然應其內微痛且癢氣殷殷鳴於腸已而溲出赤黃物三日之間藥五六進而內已清外已銷信乎其祕方足恃以活人也余舊聞疽發於背為難治之疾治之法莫良於灼艾灼艾既早而火力又至加之內滌則萬全而無虞以為治疽之良法無踰此矣孰知世有祕方藥能拔去其病本而枝葉其外者不事剪伐而自落用力簡易取效神捷如余君之治疽者乎然則疽之治於余君者又良法之尤者也嗟乎治疽於一身不與治盜于天下者同一機乎漢有盜並起渤海天子以為慮一龔遂往治之而弄兵持弩之衆悉散為良民是亦不灼艾不用刃潛去其毒而有大功於人者也雖然血氣和則大疽不發民人和則大盜不起治疽者常幸天下之無疽治盜者常幸天下之無盜君子之心蓋如是乎吾聞余君之邑有永嘉陳侯為之令陳侯善和其民無所疾苦則其心蓋未嘗不以無盜為幸而余君之所深知者歟余君深知陳侯之心則其為人治疽也吾亦有以知其心矣於其還序以贈之贈胡居敬序原注己亥至正十五年冬江浙行中書省丞相奉詔至自京師命官討罪得專其柄于時文武才謀醫卜之士咸侍幄幕以從而淮東胡君居敬以宦門子弟齒弱而氣壯聰明強記涉儒書通醫道尤親邇焉居半嵗授淳安簿不赴乃東逰會稽探禹穴絶娥江謁漢嚴子陵先生祠墓而至餘姚餘姚地僻山川夷曠風俗朴野偶有所適其意因久留焉十九年春淮右謝公以江浙參知政事統其軍臨寓餘姚公與其諸帥皆居敬舊所見者其遇於兹無不歡然願慰知嘗值難衣服錢帛罄於盜欲周其匱一日忽覔之不見問一市人皆莫知所往諸故人益念之且謂其狂不改其初也不三月其軍去還浙水西余於州郭遇居敬挈行橐野服麻鞋自東方來余問其向留何地不得見居敬笑曰吾並海東行百餘里得深山窮谷逰七十日躋巖石玩雲霞露飲木茹而不渴不飢微藥囊遺市舍動吾念幾忘返矣始余識居敬時談者言其豪放善飲酒棄財物若土芥歌姬舞女日列於前而不一動其心不知其果爾否也而鄭山輝先生又恆稱其能曰居敬於醫書無不貫通問其疑義即應口酬析歷歷有援據其治疾也若名將用兵取勝神速而常情不可測度居敬於醫可謂有過人之能矣余今年始數與居敬接察其言行乃知其有過人者豈一能而止也哉夫人所趨者勢也所厚者利也所不能絶者女色也而居敬於勢素逺矣於利素薄矣於女色素不親而無所好矣何人之難能者而居敬又能之乎是真可尚已噫能人之所難能非髙資不能也然資過髙者往往有狂疾狂而克念則其疾有以治矣居敬能人之所難能固不可以狂目之然或者亦有近似者乎於其近似者而治之不少疏又非髙資不可望也噫居敬余所尚者而又余所望者尚而有所望能無言乎故有以贈居敬贈蔡山人序原注庚子自知其命者而後可以言人之命命豈易言哉富貴貧賤命也壽夭禍福命也命懸於天天之所為深逺莫測而人欲言其將然無有不驗難矣哉是故非自知其命者不可以言人之命也蓋知命為君子君子之心不蔽乎物而理無不燭理既燭矣於富貴貧賤壽夭禍福一聽乎天之所為而無不樂焉既以樂乎已又以語乎人曰富貴命也知命者不溢不危斯可以長守富貴也貧賤命也知命者不諂不濫斯可以久處貧賤也壽夭禍福命也知命者不偷活不傷生則壽惟其壽而夭非其夭也不足欲不蹈險則福惟其福而禍非其禍也斯言也人茍聽之於世教不有助乎夫以匹夫之言而有助於世教非君子其孰能之術數之學云乎哉上虞蔡山人蚤嘗習進士業試不利即委分田野而無競於時非自知其命者歟中年艱於生事乃以五行書推人生年月日所直日辰而有以勸之於其富貴者勸其不溢不危於其貧賤者勸其不諂不濫於其壽夭禍福勸之以不偷活不傷生不足欲不蹈險為人言命而所勸若是非以君子之道處已處人者歟不然何其不專尚乎術數之學也余久處貧賤者也今年春遇山人田野間聞其言知其有志乎君子之道而心竊喜焉因其徵余言故有以贈之贈髙生序人之美惡係乎習習係乎所尚尚武者習乎干戈則思戰鬭尚禮者習乎俎豆則思恭敬是故君子必謹其習而善其尚也尚武者一於戰鬭則勇士而已耳尚禮者一於恭敬則何學不可進何德不可就哉是故君子欲知人之美惡又必觀其習而察其尚也觀其習而察其尚可以得其為人之槩矣吾鄉髙生尚禮天資朴實人也當干戈之際無慕乎進取乃執俎豆之事於鄉校歷三十月蚤夜周旋其間而恭敬之不忘非所謂尚禮者歟噫以今觀之尚武者何衆尚禮者何鮮也生以朴實之資尚禮矣茍一於恭敬而進學不已吾知其君子之歸而勇士所就惡可同日語哉其謝事鄉校也與之厚者徴余言贈之余於生既嘉其克尚於禮又望其進學於君子之歸于是乎言贈白道士序原注壬寅神與怪孔子不語而後世宗老氏者往往能役鬼神毆怪異則其法果孰從而傳之也余聞老子嘗為周柱下史周之法制載典籍者非其所掌而見之者乎按周官硩蔟氏掌覆妖鳥之巢其法以方書十日十二辰十二月嵗二十八星之號縣其巢上則去之壺涿氏掌除水蠱則以牡橭其神死淵為陵以攻禜攻蠧物則翦氏所掌以太隂之弓射天神則庭氏所掌其官皆屬司冦以此觀之周之治法有非恆情所測者孔子於神怪不語有以也周公立政治天下得以貫顯幽者為之治孔子立言教萬世不可以幽而無徵者為之教然則後世有能役鬼神毆怪異無乃周公之遺法老氏得之而傳於其徒者乎白虛氏自幼絶俗不羣委質老子法中修其業甚顓能召雲雷致雨暘追擊鬼物以救人災害以余所知者言之州治東民舍嘗連夜有瓦石擲屋上達曙有聲出門覔擲者無見也白虛為治之怪遂滅比嵗夏旱為吾州禱雨雨輒應此焯焯在人耳目者今年秋帥閫官某侯又以白虛之弭災有徵者謂余曰吾所寓居數有怪為人災吾諸幼亦嘗災藥不得治請白虛治之怪與疾俱去而吾居以寧虛有除怪弭災之德於我我以金帛報虛虛弗受敢徵子一言以贈余於世之役鬼神毆怪異固意其傳有所自况白虛弭災之事余平日所知者又辱以某侯之命以言贈虛可以辭乎乃竊解孔子所以不語者而援周官之所載者作贈白虛道士序送雲巖觀提點隋君南逰還京師序隋君明德以黃冠居雲巖觀有年矣雲巖在京師王侯將相所逰息之地也君以至正二十有三年自燕蹈海抵錢唐上天目望日出於海東過會稽探禹穴又登舟甬東取海道至閩粵然後還京師是行也蓋歷觀東南諸名山與巖穴布衣采芝苓服霞露聽風泉援鶴之音而肆志於事物轇轕之表人謂其遂往而不返矣居無何乃復步蛟龍黿鼉之宅望天子宫闕城郭以還其舊廬而往時燕齊之士所從求安期羡門之道雖浩蕩恍惚在其目前其安肯一躡其故迹也噫以隋君冠黃冠果不忘世若是使有遭遇如魏特進安知其出處不異於輩類也余考唐人才嘗怪魏特進者佐太宗濟億兆謀謨諫諍致貞觀之烈與杜房諸宰相並稱勳臣其人亦偉矣然其初則隱迹黃冠中落魄無所表暴豈憤世嫉邪無以泄其蓄遂有長往不返之志耶抑三代而降將相之傑出者多儲於神仙之流也觀漢留侯受書黃石為帝者師及曹相國用黃老之言治尚清靜則其端亦見矣於魏特進之事又烏足怪哉今海內苦兵革已久治之復謀謨諫諍者隨所儲而奮也隨所儲而奮吾以人才望當世不狹矣隋君其處黃冠奚若哉其處黃冠奚若哉
