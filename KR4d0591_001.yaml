body:
  text: 庸菴集卷一元宋禧撰五言古詩遊宿恭書記林居昨夜共宿野返宿河水湄翳翳夕隂下密葉覆參差山鹿下飲水庭鳥來擇枝與子暫遊止晤語契深期緇塵冒逺道靜宇諧曠夷榻外風雨至秉燭為題詩明發復繾綣竟日襟風隨絃誦滌旅悶子樂諒在斯驟暄變涼候春服又所宜相視宇宙內委順尚何疑四月草八日即事一首貽胡斯原晨飱止東院晚食留西居水濵坐啜茗柳下觀釣魚無事乃為樂所得良有餘緬思征途者去去將何如用韻酬友人海隅足辟地所慰得安居時艱愧蔬食矧敢謳無魚往來感故意倡酬絃誦餘言旋望城郭肆志將焉如四月草八日川上晚詠示胡斯原落景在平野森木翳橫川清風度葉下行行水紋連光影眩凡目遊鱗躍青天靜叟晚食餘為憩高門前諸生慰孤抱待客父兄賢湯茗與筆簡隨需相後先浮蹤良可嘆所駐亦偶然我衰已皓首撫運還自憐勉哉後生者無恃毛髮玄桐湖八詠為王遁菴作看雲樓孤雲何處來相對才咫尺隨風出山去青天忽無迹往來固無心幽人候朝夕高樓為徘徊無使長相憶蘭谷中谷見芳草令人憶沅湘沅湘不可往極目煙塵黃獨醒一何苦佩服埀幽光懷人千載下楚越逺相望桃花塢東塢何所有藹藹桃千株花間挂錦服石上留酒壺樂土不易得塵暗荆棘途無謂武陵逺即此堪隱居梧桐岡高岡生梧桐西舍足避暑白日變窈冥清隂落􅑵户洗硯金井泉觀文丹鳯羽翛然坐題詩涼葉過朝雨菊徑開徑延故人種菊娛晚節撫運掇其英天寒霜似雪彭澤獨何心耿耿書嵗月搖落感時邁孤芳慰人傑芙蓉隄澄澄山下水粲粲芙蓉隄翠幢雜絳節秋色分雲泥緩步念脫屣獨立知扶藜豈望衮衣至可期鳬舄來乳泉甘泉白勝乳飲之可延年老人慰飢渴嬰兒顔色鮮福地天所祕食飲非偶然塵居就枯稿令人思乳泉合澗橋石梁在山邊雙澗此中合清流本同源白礫無汚雜朝暮度漁樵車塵不相接木客有時來山童掃黃葉川上即事婉婉雙白鵝晚涼浴河水野翁怯隱憂臨流書未已平生懶學書老至隨筆耳鳥迹誰復觀月光在沙觜八月草六日遊梅川長慶寺有感古寺歷塵劫空山見清秋木葉日夜落海氣東北浮滌煩憩微迹望逺增隱憂行吟瓦礫間盛觀焉可求草露豈常濕巖雲亦暫留轉思學仙者脫身事長遊在在曷自苦起滅同浮漚送丕大基自天界寺歸佛隴炎暑伏深院朝夕誰與娛緇素雖異路旅寓同一區我來已衰朽子出復何如幽棲豈無所邈在東海隅竹色翳几榻池中淨圖書中夜忽有念涼晨理回車所向就昭曠行矣勿躊躇八月十三夜史局儒士醵飲天界寺西庭敘别分韻得天字秋寺積黃葉行見江月圓衆客感時邁史籍已成編迢遞四方至同舍非偶然久集有分期念之還足憐醵飲際良夕露坐望青天明發各有適羽鱗異天淵少壯宜努力衰病得生旋酣詠在兹席靜言乃離筵耿耿亦何為且就殘夜眠題蘭川圖君子川上居忘機對芳草芳草有姱節日夕慰幽抱故鄉别幾年洞庭風嫋嫋何人獨行吟秋來轉枯稿優遊萬壑間中夜思逺道勿復言令德逺道聊自保諒懷濓溪翁生意齊物表逝者果無窮生者殊未了邂逅為哦詩霜寒越山曉還自龍河次韻酬趙德純皓首戀丘壑征途嗟轉蓬生還亦偶爾見念鄉里中周旋答衆施蹇步敢劬躬童時未覺逺閲世忽成翁常懷俟爾坦青佩遊泮宫禮樂在諸老遺澤沾羣蒙與君桑梓契異彼萍水逢往來慰衰暮感慨寧無同願重古人約道義薰豫衷二月六日夜宿倪以道宅為題畫梅春夜宿溪上看花屢吟哦珠璣宛在眼其如粲者何衰朽不自輟秉燭褰青蘿氷雪融土脈星月垂澗阿别離在明發於焉留短歌七月草七日以考藝至福建水口驛驛官姚惠卿乃吾鄉人有沐浴飲食之留而四明桂同德又先至半日以俟皆出望外喜而賦詩老去畏行役病餘慮炎蒸陟降雲霧嶺奔趨風水程去越影生桂入閩葉凋蓂浴垢水口驛遡風山上亭顧慰值鄉彥遲需謝文明衰朽樂疏散餘事非吾能在閩省試院次韻主文旰江吳尚志述懷之作妙化魚躍淵流光蛇赴壑出書洛川龜閲世遼海鶴文運復有興儒行固無薄持衡宗楚材盍簪集閩郭謇豫素愚蒙老至焉有覺伴食愧羶腥還山憶藜藿次韻廬陵王子讓秋夜試院有作我日已去邁不見秋葉紅明月昨夜滿白露下梧桐殊方瘴癘地文會逢數公按圖得騏驥一笑凡馬空人事豈能必取舍歸蒼穹鳥啼庭前樹誰復知雌雄晤歌在今夕聚散皆浮蹤歸途畏跋涉皓首嗟飛蓬八月草六日雨止遊鼓山靈源洞至天風海濤亭賦詩一首雲卧已三夕山行歡百靈西林日華赤南澗秋草青仙佛宛如在笙磬誰與聽陟降循水曲窈窕度巖扄風濤忽在目颯爽敞孤亭茗飲助幽賞世外便獨醒尚瞻紫陽翰不隨霜露零聞見慨今昨思惟著儀刑逺來慰衰朽竒覽遺昏冥但愧無聞者凡迹同浮萍吳尚志蕭自省而下七人九日自三山驛飲罷登烏石山分韻序别以五字十句為率得盡字文飲從醉吟旅遊資汲引升高力已疲覽勝歡未盡烏石會何如龍山迹難泯視昔均有懷此别良不忍采菊惜兹辰行當還舊隱慈溪人求詩贈醫者章敬德三年艾可得八載詩未成此事太迂濶吾憐東海生病肺一年苦對酒甘獨醒誰能愈其疾酬德非常情良醫有章子方寸冰雪清珠玉文字重羽毛金帛輕作詩以為報藝苑尋簪纓遷延嵗月久坐見兵甲寧今秋我為客迢遞閩中行新冬始回棹心氣猶未平過門客難謝茅屋雞犬鳴索詩如索租衰朽詎能勝賈島詩思拙得句雙淚零百篇遇太白但用斗酒傾如何迫我甚兩耳聞風聲老至疾易作采藥隔滄溟空言適為纍浮生安足慿章子倘念我妙訣全神形嵗晚東海上有約當合并十月晦日與諸友過葉伯泰隱居出門風日暄野趨慰徒步行行五里餘訪舊寂寞處隱居隔青煙涉津向紅樹幽人不在家童子留客住為尋主翁歸北里復東渡乃從南山還衣巾認中路匍匐趨柴門歡喜見情素止渴得土酥充飢思薯蕷厚意愧吾曹為饌雞黍具望外出陳醪房中藉賢婦遂令周孫徒痛飲不欲去獨醒笑老夫徒自耿憂慮人生歡會難萬事皆有數今春曽此遊重來嵗云暮白白潮入川青青蔬在圃時序雖有移郊墟但如故平生麋鹿姿羶腥非所慕裹飯倘同襟有懷即相顧雨中寫懷奉寄朱伯言周宗性兼呈恱白雲雨水足新嵗綿延冬旱餘泥濘固可畏仍欣長園蔬嘉賔過我語繾綣慰久疏自顧復有歉敝篋唯舊書一飲不敢具隻雞耻言無病兒卧在床藥物勞猥圖微生乃如此故知謂何如俯仰宇宙內草木向春蘇遊詠豈無所且復充所娛日出即暄暖緩步有乾途相期出東郭寫心髙士居二月八日雨中有作水南掩關坐春雨生晝寒一榻委文史沉吟苦無歡路阻玄鳥至雲海何漫漫羣生有常運向背詎無端惟兹窮巷士靜言聊自安生緣諒已定過憂徒永嘆送周宗性上昌化教諭暌違倐九載過門兵革餘江郭尚如昔所向迎酒壺筮仕云有所簪笏重文儒年稔飯自足春暄氊可無家室久留滯去台甘在吳學舍近天目登車三日途念兹亦吾慰晤對為躊躇苦乏旅囊贈微言詎非迂蒼蒼山上柏濯濯水中蒲嵗候有黃落物性豈無殊願言毖恆德慎勿忘厥初寄宋景濓先生三十韻相處才數月相違已三年人來即問訊矯首玉堂仙尺書固邈邈寸心每懸懸孰謂金蘭契而如萍梗然憶昨被殊渥草茅倐牽連平生坐環堵豈意乘官船修史與末役乏才愧羣賢強述外國傳荒疏僅成篇賴有班馬手筆削容巨編素餐竊恐懼衰疾頻纒綿小几聚藥裹空床重艾煙旅邸命如線仁人俱見憐同舍既足藉同姓尤惓惓早晚辱安慰殘喘聊自延涼風送越柁而得歸園田當時十八士去留各有緣中秋佛寺裡明月照離筵後夜復敘别慘戚燈影前贈言諾教誨有暇寄江邊縹帙已拜惠所獲尚未全去年攖寧叟往還情為傳我亦􅀢行邁南閩涉山川考藝非所任冒往誰舍旃知已諒興閔疲駑詎勝鞭鬢髮日已短貧病無由痊策杖山野間靜曠庶相便擊壤或歌詠忘憂臨澗泉緬懷青雲彥文會濫隨肩作詩謝疇昔一一莫能專諸公倘垂愛契濶寧我愆秋熱嘆二首秋序已云深秋暑何太熾衰朽心益煩常望風雨至風雨杳無期烈日徹厚地白露夜未晞􅑵壁貯炎氣恨無松桂林移榻一假寐老疾將焉違輾轉發長喟其二去嵗度閩嶺暑途猶可禁行舟溪水驛解帶榕樹林宿疾不復作亦足紓憂心今去閩嶺逺秋陽何爍金疫􅂒起乘熱窮苦誰能任矯首望雲漢沉吟復沉吟題牧溪所作阿羅漢圖吾聞十八士隱見天台山石梁隔塵世路滑莓苔斑樹色在彼岸飛鳥能往還山中何所樂食飲非人寰巖石深復深衣冷雲霧間密葉足蕭爽靈獸無冥頑大海逼孤絶高泉㵼幽間冥心萬化表長往窮躋攀焉知有衰朽畏壘常相關小山陳氏清暉樓層構謝囂溷慿陵高曠間出日離東嶺歸雲度西山山溪被光景林木霽容顔陽明淨可挹而無隂翳刪仙居復誰好遊子紆珮環朝躋足澄觀夕眺慰餘間於焉釋煩慮詎謂忘人寰萬化一冥合經心秋雁還次韻朱雲巢遊鍾山有作有事汗青暇羡君山水遊吾獨阻衰疾素興徒綢繆霞光日邊近樹色雲中幽覽勝屬青眼含情嗟白頭高懷既兼得况歷人事周紬書金石富傾蓋簪纓稠俯仰慨今古直筆伸故侯雄才固馳騁餘力殊未休嘯歌寥廓際天風灑清秋先還我何乖後往君久留鬱鬱山氣佳滔滔江水流新篇足諷咏使我生逺愁壬子嵗四月甲申夜紀夢積雨暗長夜山行經險巇悲風撼林木崖谷蔽參差逺聞豺虎號鬼磷弄光輝十步九失足中心祗自持所適既迢遞黽勉焉可為道傍見明燭抵宿依茅茨開户念生客而逢主翁慈暖湯趣妻子然薪為更衣艱難又奚怨少息非所期雞鳴夜將旦熟寐百無知欣戚一以忘何有安與危生死宇宙內曠懷亦如斯聊紀夢中事誰當賡我詩題雪浦待渡圖吾邑王性常客居羅壁山中嵗晏躡冰雪還水北省親時中吳顧雲屋留其家為作雪浦待渡圖以贈之豫觀其圖有感于中賦古詩一首冉冉嵗云晏蕭蕭林木疏積雪遍原隰山川今昔殊逺眺既茫昧近矚迷舊途遊子去家久思親賦歸與寧不畏凛冽飛鳴有慈烏川廣不可越臨津為踟蹰舟子隔雲渚回篙憐久需故廬在何許北里路非迂豈無澤中鴈亦有冰下魚甘旨恆在念釣弋誠良圖生理何獨拙往返擕琴書俯仰宇宙內幽抱聊自舒日出長夜後陽復沍寒餘兹理諒無舛不樂復何如萬壑樹聲圖層崖望不極溪谷何巉巖秋風起天木奔泉落空潭石林高下響猿鶴韻相參幽人戀巖穴寂寞居山南萬籟慰衰暮忘憂非酒酣援琴寫蕭散此樂吾所耽為徐性全題顧山人天際歸舟圖佳期諒無失歸近心反勞蕭蕭江樹冷落落雲山高孤舟來浩蕩所望非漁舠風水協龜卜秋來多濁醪為方景常題顧雲屋蘭亭圖崇山氣磅礴羣峯靜儀刑風泉㵼霞嶠迢遞委幽亭溪林何濯濯汀蘭亦青青良辰各有適列坐集簪纓胡獨一時樂而遺千載名浮雲變晨暮山川久含靈撫運慨幽獨寧忘今古情題雲屋所贈高峯逺澗圖今年壬子秋九月余與玉山逸人顧雲屋連夜宿吾邑羅壁山中時近九日羅壁之顛有所謂龍門足以適登高眺逺之興雲屋以余未遊為歉明日將偕往先為作高峯逺澗圖以贈及還豫乃賦詩書其上云高泉落雲中大澤露羣石霜降草木黃青松有顔色緬思玉山期邂逅滄洲客登高贈畫圖賦詩宿羅壁題畫伊誰愛兹境而忘登涉勞一水天上逺雙松野中高峭壁無樵徑深溪絶漁舠唯應學仙者麋鹿與遊遨六月十日過極樂寺寫懷紺園草樹緑清颷朝暮涼當暑出闤闠憩此獨徜徉過客適邂逅遨遊山水鄉晤語廣居下隱憂忽遺忘况復霖雨餘市津來米航豐年足慰意撫運念平康樂土亦何逺伊誰望西方
