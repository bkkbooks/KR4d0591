body:
  text: 庸菴集卷四元宋禧撰七言律詩冬夜書懷海邊積雨客愁長底事髙樓有月光酒醒只疑天欲旦烏啼猶苦夜多霜遣懷詩賦添華髮在眼山林缺草堂欲問君平無覔處暮年人事付茫茫望雪荒村臘月十三日雨後出門泥半乾欲雪未雪雲葉亂似暮非暮風華寒敝裘在篋一冬暖遺蝗入地千尺難今夜不知多少雪閉門忍凍有袁安胡氏連理榆兩株榆樹隔河生長對君家好弟兄連理可成嘉樹傳同居真得古人情今看胡氏書青簡轉使田郎惜紫荆嵗晚鄰家誰煮豆眼中祥瑞最分明胡氏養志堂兄弟同心四五人相看慈母白頭新長垂涕淚艱難際不棄詩書寂寞濱父沒已隨嘉樹朽嵗寒今見故園春我來聽說君家事喜有諸郎慰老親衛公鶴題畫衛公好鶴鶴乘軒玉露金風灑羽翰鶴夀可期千嵗永君恩曽使萬人看縞衣忽與緇塵暗清夢空留白雪寒松下仙翁能跨汝瑶臺一望月團團胡逹道觀錦軒胡家錦雞何處來小軒花下為渠開日中錦綬自能吐世上金刀誰解裁冨貴還鄉同一夢虛無過眼已千回主人閲世今頭白鶴氅時時坐緑苔岑氏聫桂東樓君家雙桂上林中念爾長思兩伯翁諸老神遊明月夜髙樓影接廣寒宫殿前作賦知誰敵花下吟詩笑我窮頭白羡君才力盛尚看玉兔立秋風徐氏怡怡軒人間兄弟幾家好伯仲塤箎自古希我向梅川行野色君開竹户接朝暉隔河雞犬舂聲急繞屋田園豆葉肥更喜諸郎秋共被吟詩酌酒為忘歸重過烏山即事冬晴重過烏山寺年老今非白面郎石髓汲來棕葉井塵軀浴罷菊花湯三生有約誰能記一醉無愁自不妨酒醒出山空極目獨憐白髮對斜陽眉山王氏雲林書舍我愛雲林事事幽况聞書屋住溪頭春天氣暖蛟龍雨月夜隂凉翡翠樓作賦豈無攀桂客卜鄰曽有種瓜侯夢中白髮空經過何日溪邊泊釣舟送張士儀經歷張侯不見十餘年淮海歸來雪滿顛九嵗兒郎能負米半生客路未歸田寒宵燈燭西窗下春日杯盤北海邊客邸相逢又相别殘年多病重澘然元日書懷未歸城郭避車塵且伴妻孥住海濱臘月雨連元日雨故鄉人作客居人魯連東海誰擕手寧戚南山自託身只有愁心耿長夜已餘短褐對新春宿陸氏山莊故舊相招為放舟上林佳處得重遊西家客過東家宿仲氏情同伯氏留夜坐競歌三叠曲春歸只在五更頭自憐白髮渾無寐銀燭分明照客愁重過上林井亭感舊二十年前向此過凉亭寒井慰奔波當時未覺青山好此日重來白髮多投轄幾人懷往事煎茶何處聽清歌路傍野老能迎客樹下幽居奈爾何為楊仲容題柳莊誰家柳莊溪水頭我來柳下維孤舟柳花如雪送春去楊子種田看水流北􅑵隂凉足髙卧東臯鄰近時一遊門前種柳似彭澤世上有官愁未休陸氏秀野軒陸家軒子傍山開花竹當階手自栽對酒春衣看紫氣奕碁夏簟坐青苔上林芳賞令人憶三徑幽尋有客來底用雲間聽鶴唳沙鷗相近不相猜楊氏萬竹樓童子曽登萬竹樓題詩今作暮年遊老蒼不見諸君子喪亂猶驚四月秋􅑵户青雲通窈窕兒孫錦服繼風流清溪流向樓前過能與笙簧洗客愁楊氏聽水軒金沙溪上小軒開靜夜泉聲為爾猜仙子笙簫雲裏過詞人環珮月中來紫烟目眩香爐頂白浪魂驚灔澦堆我愛幽人卧空谷鈞天在耳夢初回四月十五日偕岑宗昭胡斯美及其從弟斯敏游宿竹山精舍明日題詩于壁而還龍潭橋西山谷中茅屋住者皆樵農兵前送官大木盡春後斸筍高峯重同行何人黑漆髮精舍有佛黃金容三更月明五更雨子規來呌門前松次韻王允昭遊源山中夜宿有感餘春紅紫尚菲菲訪舊傷情故老稀秉燭山林連夜宿思家道路幾人歸龎公采藥知何往杜老誅茅願豈違他日幽居山谷裏與君開户看雲飛贈陸生回棹游源日已斜道逢二陸立晴沙借人几榻開漁舍送客壺觴出酒家柘葉青連溪岸樹藤梢白覆竹籬花連朝多謝殷勤意自念風塵兩鬢華贈徐生徐卿生子世積善杜老作歌稱絶竒麒麟千古同一夢豚犬何人譏二兒橘花滿林定結實蠶繭在箔終成絲寸隂可惜緑隂下正是清和四月時凰山范氏碧梧軒范家從來有賢母東漢流風東海邊孤兒當室鳯雛立寡婦下帷梧葉連髙岡日射文明地阿閣雲飛咫尺天頭白無愁看玉樹舊書長在緑隂前為黃克敏賦農隱短褐力田山海間春耕秋穫心自間飯牛身逺虎狼窟狎鷗夢空鵷鷺班且復殺雞留宿客未須采藥入春山荒茅夾徑草廬暗鄰舍有誰相往還題鄭山輝效髙房山枯木竹石圖山輝戲作房山畫已亥經今恰十年館閣當時文物盛風塵何處畫圖傳神交未覺龍蛇逺羽化猶疑翡翠鮮前輩風流歸鄭老令人注目海雲邊羅氏兩寡婦梅川羅氏有兩寡婦皆姓朱氏一為姑一為婦也姑既失其夫有一子娶而生子甫三嵗又蚤世其妻與姑氏皆守節力紡績以活備服艱苦其志弗回也豫以辟兵寓其鄉其鄉人好義者往往為豫道兩寡婦志節若此今過其家孰見孤子祥能讀書甚勤問其年已十五矣其祖母與其母又能力教之切切焉冀其成人豫聞其鄉人稱之又若此遂為賦詩一首以塞其請云阿姑阿婦在空帷每對冰霜涕淚垂底向一門同苦節絶憐兩世看孤兒門前大石何曽轉山上喬松不可移鄉里都稱雙節婦兒郎在眼為題詩贈李光道城郭歸來百事踈殘生猶問五行書故人有子能傳業樂土何時許卜居青眼為開分别後白頭幸活戰爭餘喜君跨竈翻垂淚感舊憐貧豈獨子送趙仲容東遊會稽趙仲容先生近以一病幾不救多難之餘不得坐以俟命將以繪事游山海間豫念其艱難之際所向皆然姑以救一時之急焉耳間語及此為之悵然遂以詩送之先生見吾諸故人煩務其間有觀詩觀畫如疇昔者乎聊以先生之行卜之也漂泊風塵嘆此公早年習畫畫堂中風流尚在時非舊急難何多老更窮市駿莫憐曹霸馬作歌未遇杜陵翁逢人不必論前日好與君平賣卜同贈華松溪往歲廬陵龍君子髙常為豫談浙水東有工畫時人像者下筆㸃染輒逼真未常起草一時同事者鮮出其右華君松溪其人也松溪吾邑世家與豫同黨而生常游江海間子高稱之甚確豫則未之識焉今年正月八日遇諸邑郭鮑氏藥肆即欣然出楮筆為豫寫衰陋之相睥睨立就神骨顔色一市人見之無不撫掌發笑以為豫也豫無以答其勤乃贈詩一首龍侯長說華山人世上寫真真絶倫下筆縑緗辭起草驚人童稚巧傳神花前為灑烏巾雪兵後猶看白苧塵十載相聞能一笑豈知邂逅在新春題煮石山房吾里鮑生思美既冠而有子矣氣質日益醇每日即蚤起從其父處北市藥肆終日治生事夜則歸其室讀孔孟書不倦吾聞而喜之近自山野還邑郭以心疾費調遣常曵杖徐步靜巷中一日值鮑生因過其所謂煮石山房者壁上見一詩乃廬陵龍君子髙所題也吾又讀龍詩而喜之喜而技癢遂忘心疾之苦亦為賦七字八句詩一首而律則有不能協者矣生之東鄰有園數畝屋一區常有學仙者居之今不知其何逝矣吾聞神于醫者多仙人之流有能愈吾疾者往來其地吾將假一夕之榻而與之宿乎生為我候之鮑生賣藥江水北夜歸讀書江水南南山白石為誰煮北海清尊留客酣仙家火候憶烹鼎人世天倫知盍簪老我多憂得心疾月明借榻東家庵清明日過張與權書樓既為題唐𤣥宗擊毬醉歸圖餘興未已又賦五十六字病翁日夜抱春愁喜值清明出郭遊唐帝擊毬看畫卷張生留客坐書樓興衰可見千年事歡樂翻成四海憂我為前修墮清淚諸孫能憶曲江不新嵗岑處士見訪去年海角往來頻多謝髙情洗客塵别後嵗寒江竹老愁中春暖野花新西樓為下青燈榻南郭能尋白髮巾江水雲山猶在眼何時耕釣得相親七月草七日在天界寺送炯用明還永樂寺秋懷叙别立髙臺晚色金銀佛寺開家問已勞三月望舟行先向大江回故鄉苦樂令人憶甘露登臨待客來白髮滿頭今更短東歸山水定徘徊送天台葉夷仲之官髙唐路繞天台萬叠山當年有志出鄉關黃河北渡之官去白象南來奉使還際會風雲初發跡憑陵瘴癘已開顔中原一望多秋草為政知君未得閒悼蓉峯處士原注處士宋景濓先生父處士年髙太史宅仙華山墜少微星客車送柩過千兩子業傳家重六經山氣猶疑風肅肅溪光長見水泠泠從來同姓多傷感三誦哀章涕淚零崔氏萬松山房揚州城外松萬株誰葬此丘崔大夫生賢總是廊廟具濟世豈同山澤癯秋幹巢雲來海鶴春花啄露集臺烏當年讀禮關心處舉目難忘室一區
